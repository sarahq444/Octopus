name: Build Octopus APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./OctopusApp/OctopusApp/gradlew

      - name: Build APK
        run: cd OctopusApp/OctopusApp && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Octopus-APK
          path: OctopusApp/OctopusApp/app/build/outputs/apk/debug/app-debug.apk
