  /* Embedded high-quality font stack — no internet needed */

<style>
:root{--bg:#f9f8f6;--bg2:#ffffff;--bg3:#f0ede8;--text:#1a1a1a;--text2:#555;--text3:#999;--accent:#1a1a1a;--accent2:#c8a96e;--border:#e8e4de;--done:#b0a898;--tab-active:#1a1a1a;--tab-inactive:#999;--shadow:0 2px 20px rgba(0,0,0,.06);--radius:14px;--danger:#c0392b;--font-body:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;--font-display:Georgia,'Times New Roman',serif;}
.dark{--bg:#000;--bg2:#0f0f0f;--bg3:#1a1a1a;--text:#f5f5f0;--text2:#aaa;--text3:#555;--accent:#f5f5f0;--accent2:#c8a96e;--border:#2a2a2a;--done:#444;--tab-active:#f5f5f0;--tab-inactive:#555;--shadow:0 2px 20px rgba(0,0,0,.4);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px 0;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.app-title{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--text)}
.header-icons{display:flex;gap:7px;align-items:center}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:17px;padding:4px;border-radius:8px;transition:color .2s;display:flex;align-items:center}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 13px;font-size:11.5px;font-weight:500;letter-spacing:.3px;color:var(--tab-inactive);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2.5px solid transparent;transition:color .2s,border-color .2s;text-transform:uppercase;font-family:var(--font-body)}
.tab.active{color:var(--tab-active);border-bottom-color:var(--accent2)}
.content{flex:1;overflow-y:auto;padding:20px 16px 100px;scrollbar-width:none}
.content::-webkit-scrollbar{display:none}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:10px;margin-top:20px;font-weight:500}
.section-label:first-child{margin-top:0}
.task-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;cursor:grab;transition:box-shadow .2s,opacity .2s}
.task-item.dragging{opacity:.4}
.task-item.drag-over{border-color:var(--accent2)}
.task-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}
.task-check.done{background:var(--accent2);border-color:var(--accent2)}
.task-check.done::after{content:'✓';color:white;font-size:11px;font-weight:700}
.task-text{flex:1;font-size:15px;line-height:1.45;color:var(--text);word-break:break-word}
.task-text.done{text-decoration:line-through;color:var(--done)}
.task-meta{font-size:11px;color:var(--text3);margin-top:3px}
.task-action-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 4px;border-radius:6px;transition:color .2s}
.task-action-btn:hover{color:var(--text)}
.drag-handle{color:var(--text3);font-size:14px;cursor:grab;flex-shrink:0;margin-top:2px}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.add-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;align-items:center;z-index:200}
.add-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:15px;color:var(--text);font-family:var(--font-body);outline:none;transition:border-color .2s}
.add-input:focus{border-color:var(--accent2)}
.add-input::placeholder{color:var(--text3)}
.add-btn{background:var(--accent);color:var(--bg2);border:none;border-radius:10px;padding:10px 18px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-body)}
.category-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);color:var(--text2);background:var(--bg2);transition:all .15s;display:flex;align-items:center;gap:4px}
.chip.active{background:var(--accent);color:var(--bg2);border-color:var(--accent)}
.chip-x{font-size:10px;opacity:.5}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:var(--font-display);font-size:20px;font-weight:700;margin-bottom:18px}
.modal-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--text);font-family:var(--font-body);outline:none;transition:border-color .2s;margin-bottom:12px;resize:vertical;min-height:44px}
.modal-input:focus{border-color:var(--accent2)}
.modal-btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:16px;font-weight:600;cursor:pointer;font-family:var(--font-body);margin-bottom:10px;transition:opacity .2s}
.modal-btn.primary{background:var(--accent);color:var(--bg2)}
.modal-btn.secondary{background:var(--bg3);color:var(--text)}
.modal-btn.danger{background:var(--danger);color:white}
.modal-btn:hover{opacity:.85}
.progress-bar{background:var(--bg3);border-radius:4px;height:4px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent2);border-radius:4px;transition:width .4s ease}
.sub-tabs{display:flex;margin-bottom:16px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{padding:8px 14px;font-size:12px;font-weight:500;color:var(--text3);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;font-family:var(--font-body)}
.sub-tab.active{color:var(--accent2);border-bottom-color:var(--accent2)}
.bible-books{display:flex;flex-wrap:wrap;gap:8px}
.bible-book{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);color:var(--text2);background:var(--bg2);transition:all .15s}
.bible-book.read{background:var(--accent2);color:white;border-color:var(--accent2)}
.history-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.history-task{font-size:14px;color:var(--done);text-decoration:line-through}
.history-date{font-size:11px;color:var(--text3);margin-top:3px}
.notif-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.notif-time{font-size:13px;font-weight:600;color:var(--accent2);min-width:55px}
.notif-msg{font-size:14px;color:var(--text);flex:1}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-text{font-size:15px}
/* FLOW SCREEN */
.flow-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;text-align:center;overflow-y:auto}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.flow-inner{animation:fi .35s ease;display:flex;flex-direction:column;align-items:center;width:100%;max-width:400px}
.flow-icon{font-size:48px;margin-bottom:18px}
.flow-title{font-family:var(--font-display);font-size:24px;font-weight:700;margin-bottom:10px;line-height:1.3}
.flow-subtitle{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.6}
.flow-btn{width:100%;max-width:320px;padding:15px;border-radius:14px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:opacity .2s;margin-bottom:10px}
.flow-btn.primary{background:var(--accent);color:var(--bg2)}
.flow-btn.secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.flow-input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;font-size:15px;color:var(--text);font-family:var(--font-body);outline:none;resize:none;margin-bottom:14px}
.flow-input:focus{border-color:var(--accent2)}
.flashcard{width:100%;max-width:320px;min-height:180px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px 20px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:19px;line-height:1.5;font-family:var(--font-display);box-shadow:var(--shadow);margin-bottom:20px;cursor:pointer;transition:transform .15s}
.flashcard:active{transform:scale(.98)}
/* HAPPINESS PLAN */
.hp-card{background:linear-gradient(135deg,rgba(200,169,110,.13),rgba(200,169,110,.03));border:1px solid rgba(200,169,110,.35);border-radius:var(--radius);padding:16px;margin-bottom:18px}
.hp-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent2);font-weight:600;margin-bottom:10px}
.bullet-item{display:flex;align-items:flex-start;gap:9px;padding:6px 0;border-bottom:1px solid var(--border)}
.bullet-item:last-child{border-bottom:none}
.bullet-dot{font-size:15px;flex-shrink:0}
.bullet-text{flex:1;font-size:14px;line-height:1.45;color:var(--text)}
.bullet-text.done{text-decoration:line-through;color:var(--done)}
.bullet-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;padding:2px}
/* AOD */
.aod-card{background:linear-gradient(135deg,rgba(200,169,110,.15),rgba(200,169,110,.04));border:1px solid rgba(200,169,110,.4);border-radius:16px;padding:18px;margin-bottom:16px;text-align:center}
.aod-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--accent2);font-weight:600;margin-bottom:8px}
.aod-text{font-family:var(--font-display);font-size:16px;line-height:1.6;color:var(--text);font-style:italic}
/* GRATITUDE */
.gratitude-entry{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.gratitude-date{font-size:11px;color:var(--accent2);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.gratitude-text{font-size:14px;line-height:1.6;color:var(--text)}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <span class="app-title">Octopus</span>
      <div class="header-icons">
        <button class="icon-btn" onclick="openAffirmations()" title="Affirmations">✨</button>
        <button class="icon-btn" onclick="openMoodAndWins()" title="Mood & Wins">🎈</button>
        <button class="icon-btn" onclick="openGratitudeHistory()" title="Gratitude">🙏</button>
        <button class="icon-btn" onclick="openHistory()" title="History">📋</button>
        <button class="icon-btn" onclick="toggleDark()" id="darkBtn">🌙</button>
        <button class="icon-btn" onclick="openNotifManager()" title="Notifications">🔔</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('today',this)">Today</button>
      <button class="tab" onclick="switchTab('weekly',this)">Weekly</button>
      <button class="tab" onclick="switchTab('monthly',this)">Monthly</button>
      <button class="tab" onclick="switchTab('yearly',this)">Yearly</button>
      <button class="tab" onclick="switchTab('backlog',this)">Backlog</button>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
  <div class="add-bar">
    <input class="add-input" id="addInput" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTask()">
    <button class="add-btn" onclick="addTask()">Add</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<div class="flow-screen" id="flowScreen" style="display:none"></div>

<script>
// ============================================================
// STATE
// ============================================================
let S={
  tasks:{today:[],weekly:[],monthly:[],yearly:[],backlog:[]},
  categories:['Personal','Work','Health','Family'],
  yearlySubTabs:['Goals','Bible Tracker'],
  bibleRead:{},
  affirmations:[],        // [{text,category}]
  affCategories:['General'],
  affirmationOfDay:null,  // {text,date}
  notifications:[],
  history:[],
  darkMode:false,
  currentTab:'today',
  currentYearlySub:'Goals',
  currentCategory:'All',
  lastMorningFlow:null,
  lastEveningFlow:null,
  gratitude:[],           // [{date,text,ts}]
  moodShifters:[],        // [{text}]
  wins:[],                // [{text}]
  happinessPlan:[],       // [{text,isTask,done}]
  lastHPDate:null,
  yearlyMeta:{}           // {subTabName: {total, done, unit}}
};

const BIBLE=['Genesis','Exodus','Leviticus','Numbers','Deuteronomy','Joshua','Judges','Ruth','1 Samuel','2 Samuel','1 Kings','2 Kings','1 Chronicles','2 Chronicles','Ezra','Nehemiah','Esther','Job','Psalms','Proverbs','Ecclesiastes','Song of Songs','Isaiah','Jeremiah','Lamentations','Ezekiel','Daniel','Hosea','Joel','Amos','Obadiah','Jonah','Micah','Nahum','Habakkuk','Zephaniah','Haggai','Zechariah','Malachi','Matthew','Mark','Luke','John','Acts','Romans','1 Corinthians','2 Corinthians','Galatians','Ephesians','Philippians','Colossians','1 Thessalonians','2 Thessalonians','1 Timothy','2 Timothy','Titus','Philemon','Hebrews','James','1 Peter','2 Peter','1 John','2 John','3 John','Jude','Revelation'];
const CCOLORS={Personal:'#c8a96e',Work:'#5b8dee',Health:'#27ae60',Family:'#e74c3c'};
const cc=c=>CCOLORS[c]||'#9b59b6';
const td=()=>new Date().toDateString();
const h=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function save(){try{localStorage.setItem('mpl3',JSON.stringify(S))}catch(e){}}
function load(){try{const s=localStorage.getItem('mpl3');if(s)S={...S,...JSON.parse(s)}}catch(e){}}

// ============================================================
// TABS
// ============================================================
function switchTab(tab,el){
  S.currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(el)el.classList.add('active');
  render();
}

// ============================================================
// RENDER
// ============================================================
function render(){
  const c=document.getElementById('mainContent');
  if(S.currentTab==='today')renderToday(c);
  else if(S.currentTab==='weekly')renderList(c,'weekly','This Week');
  else if(S.currentTab==='monthly')renderList(c,'monthly','This Month');
  else if(S.currentTab==='yearly')renderYearly(c);
  else if(S.currentTab==='backlog')renderList(c,'backlog','Backlog');
}

function renderToday(c){
  const cats=['All',...S.categories];
  const act=S.currentCategory;
  const tasks=S.tasks.today;
  const filt=act==='All'?tasks:tasks.filter(t=>t.category===act);
  const done=filt.filter(t=>t.done).length;
  const pct=filt.length?Math.round(done/filt.length*100):0;

  let aodHTML='';
  if(S.affirmationOfDay&&S.affirmationOfDay.date===td())
    aodHTML=`<div class="aod-card"><div class="aod-label">✨ Affirmation of the Day</div><div class="aod-text">${h(S.affirmationOfDay.text)}</div></div>`;

  let hpHTML='';
  const plan=S.happinessPlan||[];
  if(S.lastHPDate===td()&&plan.length){
    hpHTML=`<div class="hp-card">
      <div class="hp-title">🌟 Today's Happiness Plan</div>
      ${plan.map((p,i)=>`<div class="bullet-item">
        <div class="bullet-dot">${p.isTask?'☐':'•'}</div>
        <div class="bullet-text ${p.done?'done':''}">${h(p.text)}</div>
        ${p.isTask?`<div class="task-check ${p.done?'done':''}" style="width:18px;height:18px;margin-top:0;flex-shrink:0" onclick="toggleHP(${i})"></div>`:''}
        <button class="bullet-del" onclick="removeHP(${i})">✕</button>
      </div>`).join('')}
      <button onclick="addHPItem()" style="margin-top:10px;background:none;border:1px dashed var(--accent2);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--accent2);cursor:pointer;width:100%;font-family:inherit">+ Add to plan</button>
    </div>`;
  }

  c.innerHTML=`
    <div class="category-chips">
      ${cats.map(cat=>`<div class="chip ${act===cat?'active':''}" onclick="filterCat('${cat}')">
        ${cat}${cat!=='All'?`<span class="chip-x" onclick="event.stopPropagation();delCat('${cat}')">✕</span>`:''}
      </div>`).join('')}
      <div class="chip" onclick="addCat()">+ New</div>
      <div class="chip" onclick="manageCats()">✏️</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    ${aodHTML}${hpHTML}
    <div class="section-label">${done}/${filt.length} tasks done</div>
    <div id="taskList">${filt.length?filt.map((t,i)=>taskHTML(t,i,'today')).join(''):emptyHTML("You're ahead. Add something.")}</div>`;
  initDrag('today');
}

function renderList(c,tab,label){
  const tasks=S.tasks[tab];
  const done=tasks.filter(t=>t.done).length;
  c.innerHTML=`<div class="section-label">${label} — ${done}/${tasks.length} done</div>
    <div id="taskList">${tasks.length?tasks.map((t,i)=>taskHTML(t,i,tab)).join(''):emptyHTML('Nothing here yet.')}</div>`;
  initDrag(tab);
}

function renderYearly(c){
  const subs=S.yearlySubTabs;
  const active=S.currentYearlySub;
  let inner='';

  if(active==='Goals'){
    inner=`<div id="taskList">${S.tasks.yearly.length?S.tasks.yearly.map((t,i)=>taskHTML(t,i,'yearly')).join(''):emptyHTML('Set your big goals for the year.')}</div>`;
  } else if(active==='Bible Tracker'){
    const read=S.bibleRead||{};
    const cnt=Object.values(read).filter(Boolean).length;
    inner=`<div class="section-label">${cnt}/${BIBLE.length} books read</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(cnt/BIBLE.length*100)}%"></div></div>
      <div class="bible-books">${BIBLE.map(b=>`<div class="bible-book ${read[b]?'read':''}" onclick="toggleBible('${b}')">${b}</div>`).join('')}</div>`;
  } else {
    // Custom yearly sub-tab — with editable items + optional tracker
    const key='yearly_'+active;
    if(!S.tasks[key])S.tasks[key]=[];
    const meta=S.yearlyMeta?.[active]||{};
    const items=S.tasks[key];

    // Tracker header (if configured)
    let trackerHTML='';
    if(meta.total){
      const done=meta.done||0;
      const pct=Math.round(done/meta.total*100);
      const unit=meta.unit||'items';

        </div>
        <div class="progress-bar" style="margin-bottom:10px"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="display:flex;gap:8px">
          <button onclick="trackerAdjust('${active}',-1)" style="flex:1;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:18px;cursor:pointer">−</button>

    inner=`${trackerHTML}
      <div id="taskList">${items.length?items.map((t,i)=>yearlyItemHTML(t,i,key)).join(''):emptyHTML('Add items to this section.')}</div>`;
  }

  const tabsHTML=`<div class="sub-tabs">
    ${subs.map(s=>`<button class="sub-tab ${active===s?'active':''}" onclick="switchYearlySub('${s}')">${h(s)}</button>`).join('')}

    ${active!=='Goals'&&active!=='Bible Tracker'?`<button class="sub-tab" onclick="manageYearlySub('${active}')">✏️</button>`:''}
  </div>`;

  c.innerHTML=tabsHTML+inner;
  if(active==='Goals')initDrag('yearly');

// Tracker functions
function addTracker(sub){
  openModal(`<div class="modal-handle"></div><div class="modal-title">Add Progress Tracker</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:14px">Like the Bible tracker — track how many you've done out of a total.</div>
    <input class="modal-input" id="trTotal" type="number" placeholder="Total (e.g. 20)" min="1" style="width:100%">
    <input class="modal-input" id="trUnit" placeholder="Unit name (e.g. chapters, pages, sessions...)" style="width:100%">
    <input class="modal-input" id="trDone" type="number" placeholder="Already done (default 0)" min="0" style="width:100%">
    <button class="modal-btn primary" onclick="saveTracker('${sub}')">Add Tracker</button>
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>`);
}
function editTracker(sub){
  const meta=S.yearlyMeta?.[sub]||{};
  openModal(`<div class="modal-handle"></div><div class="modal-title">Edit Tracker</div>
    <input class="modal-input" id="trTotal" type="number" value="${meta.total||''}" placeholder="Total" min="1" style="width:100%">
    <input class="modal-input" id="trUnit" value="${h(meta.unit||'')}" placeholder="Unit name..." style="width:100%">
    <input class="modal-input" id="trDone" type="number" value="${meta.done||0}" placeholder="Done so far" min="0" style="width:100%">
    <button class="modal-btn primary" onclick="saveTracker('${sub}')">Save</button>
    <button class="modal-btn danger" onclick="removeTracker('${sub}')">Remove Tracker</button>
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>`);
}
function saveTracker(sub){
  const total=parseInt(document.getElementById('trTotal').value)||0;
  const unit=document.getElementById('trUnit').value.trim()||'items';
  const done=Math.min(parseInt(document.getElementById('trDone').value)||0,total);
  if(!total){closeModal();return;}
  if(!S.yearlyMeta)S.yearlyMeta={};
  S.yearlyMeta[sub]={total,unit,done};
  save();closeModal();render();
}
function removeTracker(sub){
  if(S.yearlyMeta)delete S.yearlyMeta[sub];
  save();closeModal();render();
}
function trackerAdjust(sub,delta){
  if(!S.yearlyMeta?.[sub])return;
  const m=S.yearlyMeta[sub];
  m.done=Math.max(0,Math.min(m.total,(m.done||0)+delta));
  save();render();
}

function manageYearlySub(sub){
  openModal(`<div class="modal-handle"></div><div class="modal-title">Edit Section</div>
    <input class="modal-input" id="mysName" value="${h(sub)}" placeholder="Section name..." style="width:100%">
    <button class="modal-btn primary" onclick="renameYearlySub('${sub}')">Rename</button>
    <button class="modal-btn danger" onclick="deleteYearlySub('${sub}')">Delete Section</button>
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>`);
}
function renameYearlySub(old){
  const nv=document.getElementById('mysName').value.trim();
  if(!nv||nv===old){closeModal();return;}
  const idx=S.yearlySubTabs.indexOf(old);
  if(idx>-1)S.yearlySubTabs[idx]=nv;
  S.tasks['yearly_'+nv]=S.tasks['yearly_'+old]||[];
  delete S.tasks['yearly_'+old];
  if(S.yearlyMeta){S.yearlyMeta[nv]=S.yearlyMeta[old];delete S.yearlyMeta[old];}
  S.currentYearlySub=nv;
  save();closeModal();render();
}
function deleteYearlySub(sub){
  if(!confirm(`Delete "${sub}" and all its items?`))return;
  S.yearlySubTabs=S.yearlySubTabs.filter(s=>s!==sub);
  delete S.tasks['yearly_'+sub];
  if(S.yearlyMeta)delete S.yearlyMeta[sub];
  S.currentYearlySub=S.yearlySubTabs[0]||'Goals';
  save();closeModal();render();
}

function initDragYearly(key){
  const items=document.querySelectorAll('.task-item');
  let src=null;
  items.forEach(item=>{
    item.addEventListener('dragstart',()=>{src=item;item.classList.add('dragging');});
    item.addEventListener('dragend',()=>item.classList.remove('dragging'));
    item.addEventListener('dragover',e=>{e.preventDefault();item.classList.add('drag-over');});
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{
      e.preventDefault();item.classList.remove('drag-over');
      if(!src||src===item)return;
      const fi=parseInt(src.dataset.index),ti=parseInt(item.dataset.index);
      const arr=S.tasks[key];const[m]=arr.splice(fi,1);arr.splice(ti,0,m);
      save();render();
    });
  });
}

function getTab(){

function addTask(){
  const inp=document.getElementById('addInput');
  const text=inp.value.trim();if(!text)return;
  const tab=getTab();if(!tab)return;
  if(!S.tasks[tab])S.tasks[tab]=[];

  S.tasks[tab].push({text,done:false,category:cat,created:Date.now()});
  inp.value='';save();render();
}

function toggleTask(tab,i){
  const t=S.tasks[tab][i];t.done=!t.done;
  if(t.done){S.history.unshift({text:t.text,tab,date:new Date().toLocaleDateString(),ts:Date.now()});if(S.history.length>300)S.history.pop();}
  save();render();
}
function deleteTask(tab,i){S.tasks[tab].splice(i,1);save();render();}
function moveToBacklog(tab,i){const t=S.tasks[tab].splice(i,1)[0];t.done=false;S.tasks.backlog.push(t);save();render();}

    <div style="max-height:45vh;overflow-y:auto;margin-bottom:12px" id="winsList">${bulletListHTML(S.wins,'wins')}</div>
    <div style="display:flex;gap:8px">
      <input class="modal-input" id="winsInp" placeholder="Add a win..." style="margin-bottom:0;flex:1">
      <button onclick="addBullet('wins','winsInp','winsList')" style="background:var(--accent);color:var(--bg2);border:none;border-radius:10px;padding:10px 16px;cursor:pointer;font-size:18px;flex-shrink:0">+</button>
    </div>
    <button class="modal-btn secondary" style="margin-top:12px" onclick="closeModal()">Done</button>`);
}

function bulletListHTML(arr,key){
  if(!arr||!arr.length)return`<div style="text-align:center;padding:20px;color:var(--text3);font-size:14px">Nothing here yet.</div>`;
  return arr.map((item,i)=>`<div class="bullet-item">
    <div class="bullet-dot">•</div>
    <div class="bullet-text">${h(item.text||item)}</div>
    <button class="bullet-del" onclick="removeBullet('${key}',${i})">✕</button>
  </div>`).join('');
}

function addBullet(key,inputId,listId){
  const inp=document.getElementById(inputId);
  const v=inp.value.trim();if(!v)return;
  if(!S[key])S[key]=[];
  S[key].push({text:v});inp.value='';save();
  const el=document.getElementById(listId);
  if(el)el.innerHTML=bulletListHTML(S[key],key);
}

function removeBullet(key,i){
  S[key].splice(i,1);save();
  const el=document.getElementById(key==='moodShifters'?'moodList':'winsList');
  if(el)el.innerHTML=bulletListHTML(S[key],key);
}

function openGratitudeHistory(){

    <button class="modal-btn primary" onclick="closeModal();openEveningGratitude()">+ Write Today's Gratitude</button>
    <div style="max-height:55vh;overflow-y:auto">
      ${S.gratitude.length?S.gratitude.map(g=>`<div class="gratitude-entry"><div class="gratitude-date">${g.date}</div><div class="gratitude-text">${h(g.text)}</div></div>`).join(''):'<div class="empty" style="padding:20px"><div class="empty-icon">🌙</div><div class="empty-text">No entries yet. Your first gratitude entry awaits.</div></div>'}

}

function openEveningGratitude(){
  const flow=document.getElementById('flowScreen');
  flow.style.display='flex';
  flow.innerHTML=`<div class="flow-inner">
    <div class="flow-icon">🌙</div>
    <div class="flow-title">Evening Reflection</div>

  const text=document.getElementById('gratTxt').value.trim();
  if(text){
    S.gratitude.unshift({date:new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),ts:Date.now(),text});

    S.lastEveningFlow=td();save();
  }
  endFlow();
}

// ============================================================
function openNotifManager(){
  openModal(`<div class="modal-handle"></div><div class="modal-title">🔔 My Notifications</div>
    <button class="modal-btn primary" onclick="closeModal();openAddNotif()">+ Write a Notification</button>
    <div style="margin-top:8px">
      ${S.notifications.length?S.notifications.map((n,i)=>`<div class="notif-item">
        <div class="notif-time">${n.time||'All day'}</div>
        <div class="notif-msg">${h(n.message)}</div>
        <button class="task-action-btn" onclick="delNotif(${i});closeModal();openNotifManager()">✕</button>
      </div>`).join(''):'<div class="empty" style="padding:16px 0"><div class="empty-icon">🔕</div><div class="empty-text">No notifications yet.</div></div>'}
    </div>`);
}

function openAddNotif(){
  openModal(`<div class="modal-handle"></div><div class="modal-title">Write a Notification</div>
    <input class="modal-input" id="nTime" type="time" style="width:100%">
    <textarea class="modal-input" id="nMsg" placeholder="Your exact message word for word..." rows="4" style="width:100%;resize:none"></textarea>
    <button class="modal-btn primary" onclick="saveNotif()">Save</button>
    <button class="modal-btn secondary" onclick="closeModal();openNotifManager()">Back</button>`);
}
function saveNotif(){
  const time=document.getElementById('nTime').value;
  const msg=document.getElementById('nMsg').value.trim();
  if(!msg)return;
  S.notifications.push({time,message:msg,created:Date.now()});save();
  scheduleNotif(time,msg);closeModal();openNotifManager();
}
function delNotif(i){S.notifications.splice(i,1);save();}
function scheduleNotif(time,message){
  if(!('Notification'in window)||Notification.permission!=='granted'||!time)return;
  const[hh,mm]=time.split(':').map(Number);
  const now=new Date(),target=new Date(now);
  target.setHours(hh,mm,0,0);if(target<=now)target.setDate(target.getDate()+1);
  setTimeout(()=>{
    new Notification('Octopus',{body:message});
    setInterval(()=>new Notification('Octopus',{body:message}),86400000);
  },target-now);
}

// DARK MODE
// ============================================================
function toggleDark(){S.darkMode=!S.darkMode;document.body.classList.toggle('dark',S.darkMode);document.getElementById('darkBtn').textContent=S.darkMode?'☀️':'🌙';save();}

// MODAL
// ============================================================
function openModal(html){document.getElementById('modalContent').innerHTML=html;document.getElementById('modalOverlay').classList.add('open');}
function closeModal(e){if(e&&e.target!==document.getElementById('modalOverlay'))return;document.getElementById('modalOverlay').classList.remove('open');}

// ============================================================
// FLOW SCREEN
// ============================================================
function endFlow(){document.getElementById('flowScreen').style.display='none';}

// ============================================================
// MORNING FLOW (7 steps)
// ============================================================
function checkFlows(){
  const hr=new Date().getHours();
  const day=td();
  if(hr>=23&&S.lastEveningFlow!==day){openEveningGratitude();return;}
  if(hr>=5&&hr<12&&S.lastMorningFlow!==day){startMorningFlow();return;}
  if(!S.lastMorningFlow)startMorningFlow();
}

function startMorningFlow(){showMS(0);}

function showMS(step){
  const flow=document.getElementById('flowScreen');
  flow.style.display='flex';

  const render_step={
    0:()=>`<div class="flow-inner">
      <div class="flow-icon">🌅</div><div class="flow-title">Good morning.</div>
      <div class="flow-subtitle">Time to set yourself up to win today.</div>
      <button class="flow-btn primary" onclick="showMS(1)">Let's go →</button>
      <button class="flow-btn secondary" onclick="endMorningFlow()">Skip for now</button>
    </div>`,
    1:()=>{
      const bl=S.tasks.backlog;
      return`<div class="flow-inner">
        <div class="flow-icon">📦</div><div class="flow-title">Backlog Review</div>
        <div class="flow-subtitle">Move anything to today?</div>
        ${bl.length?`<div style="width:100%;max-height:200px;overflow-y:auto;margin-bottom:14px">${bl.map((t,i)=>`
          <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;text-align:left">
            <div style="flex:1;font-size:14px">${h(t.text)}</div>
            <button onclick="bl2today(${i})" style="background:var(--accent2);color:white;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit">+ Today</button>
          </div>`).join('')}</div>`:`<div style="font-size:14px;color:var(--text3);margin-bottom:20px">Backlog is empty ✓</div>`}
        <button class="flow-btn primary" onclick="showMS(2)">Done →</button>
        <button class="flow-btn secondary" onclick="endMorningFlow()">Skip</button>
      </div>`;
    },
    2:()=>reviewStep('📅','Weekly Goals',S.tasks.weekly,3),
    3:()=>reviewStep('🗓️','Monthly Goals',S.tasks.monthly,4),
    4:()=>{
      const moodList=S.moodShifters.slice(0,4).map(m=>m.text||m).join(' · ')||'None yet';
      S.happinessPlan=S.lastHPDate===td()?S.happinessPlan:[];
      return`<div class="flow-inner">
        <div class="flow-icon">🌟</div><div class="flow-title">Plan to stay happy today?</div>
        <div class="flow-subtitle">What will keep your spirit high?</div>
        <div style="width:100%;margin-bottom:10px">
          <div style="font-size:12px;color:var(--text3);margin-bottom:8px;text-align:left">Your mood shifters: ${h(moodList)}</div>
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <input id="hpfi" class="flow-input" style="min-height:44px;resize:none;flex:1;margin-bottom:0" placeholder="e.g. go for a walk...">
            <button onclick="addFlowHP()" style="background:var(--accent2);color:white;border:none;border-radius:10px;padding:10px 14px;cursor:pointer;font-size:18px;flex-shrink:0">+</button>
          </div>
          <div id="hpfl" style="max-height:130px;overflow-y:auto">
            ${S.happinessPlan.map((p,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)"><div style="flex:1;font-size:14px">• ${h(p.text)}</div><button onclick="rmFlowHP(${i})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px">✕</button></div>`).join('')}
          </div>
        </div>
        <button class="flow-btn primary" onclick="finalHP()">Set My Plan →</button>
        <button class="flow-btn secondary" onclick="showMS(5)">Skip</button>
      </div>`;
    },
    5:()=>{
      if(!S.affirmations.length)return showMS(6)||'';
      return`<div class="flow-inner">
        <div class="flow-icon">⭐</div><div class="flow-title">Affirmation of the Day</div>
        <div class="flow-subtitle">Choose one to carry with you today.</div>
        <div style="width:100%;max-height:50vh;overflow-y:auto;margin-bottom:14px">
          ${S.affirmations.map((a,i)=>`
            <div onclick="setAODFlow(${i})" style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .2s" onmouseover="this.style.borderColor='var(--accent2)'" onmouseout="this.style.borderColor='var(--border)'">
              <div style="font-size:14px;line-height:1.4">${h(a.text||a)}</div>
            </div>`).join('')}
        </div>
        <button class="flow-btn secondary" onclick="showMS(6)">Skip</button>
      </div>`;
    },
    6:()=>`<div class="flow-inner">
      <div class="flow-icon">🔔</div><div class="flow-title">Set Today's Notifications</div>
      <div class="flow-subtitle">Write them word for word.</div>
      <div style="width:100%;display:flex;gap:8px;flex-direction:column;margin-bottom:14px">
        <input id="fnt" type="time" class="flow-input" style="min-height:44px;resize:none">
        <textarea id="fnm" class="flow-input" rows="2" placeholder="Your exact message..."></textarea>
        <button onclick="addFlowNotif()" style="background:var(--accent2);color:white;border:none;border-radius:10px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">+ Add Notification</button>
        <div id="fnl">${S.notifications.slice(-3).map(n=>`<div style="font-size:12px;color:var(--text3);padding:3px 0">${n.time} — ${h(n.message)}</div>`).join('')}</div>
      </div>
      <button class="flow-btn primary" onclick="endMorningFlow()">Let's win today 🚀</button>
    </div>`
  };

  const fn=render_step[step];
  if(fn){const r=fn();if(r)flow.innerHTML=r;}
}

function reviewStep(icon,title,tasks,next){
  return`<div class="flow-inner">
    <div class="flow-icon">${icon}</div><div class="flow-title">${title}</div>
    <div class="flow-subtitle">Keep these top of mind.</div>
    ${tasks.length?`<div style="width:100%;max-height:180px;overflow-y:auto;margin-bottom:14px">${tasks.map(t=>`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:14px;text-align:left;${t.done?'text-decoration:line-through;color:var(--done)':''}">${h(t.text)}</div>`).join('')}</div>`:`<div style="font-size:14px;color:var(--text3);margin-bottom:20px">Nothing set yet.</div>`}
    <button class="flow-btn primary" onclick="showMS(${next})">Done →</button>
    <button class="flow-btn secondary" onclick="endMorningFlow()">Skip</button>
  </div>`;
}

function bl2today(i){const t=S.tasks.backlog.splice(i,1)[0];t.done=false;S.tasks.today.push(t);save();showMS(1);}

function addFlowHP(){
  const inp=document.getElementById('hpfi');const v=inp.value.trim();if(!v)return;
  if(!S.happinessPlan)S.happinessPlan=[];
  S.happinessPlan.push({text:v,isTask:false,done:false});S.lastHPDate=td();inp.value='';save();
  const el=document.getElementById('hpfl');
  if(el)el.innerHTML=S.happinessPlan.map((p,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)"><div style="flex:1;font-size:14px">• ${h(p.text)}</div><button onclick="rmFlowHP(${i})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px">✕</button></div>`).join('');
}

function rmFlowHP(i){
  S.happinessPlan.splice(i,1);save();
  const el=document.getElementById('hpfl');
  if(el)el.innerHTML=S.happinessPlan.map((p,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)"><div style="flex:1;font-size:14px">• ${h(p.text)}</div><button onclick="rmFlowHP(${i})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px">✕</button></div>`).join('');
}

function finalHP(){S.lastHPDate=td();save();showMS(5);}
function setAODFlow(i){S.affirmationOfDay={text:S.affirmations[i].text||S.affirmations[i],date:td()};save();showMS(6);}

function addFlowNotif(){
  const time=document.getElementById('fnt').value;
  const msg=document.getElementById('fnm').value.trim();if(!msg)return;
  S.notifications.push({time,message:msg,created:Date.now()});save();scheduleNotif(time,msg);
  document.getElementById('fnm').value='';
  const el=document.getElementById('fnl');
  if(el)el.innerHTML+=`<div style="font-size:12px;color:var(--text3);padding:3px 0">${time} — ${h(msg)}</div>`;
}

function endMorningFlow(){S.lastMorningFlow=td();save();endFlow();render();}

// ============================================================
// AFFIRMATION REMINDERS
// ============================================================
function scheduleAffReminders(){
  if(!('Notification'in window)||Notification.permission!=='granted')return;
  [9,12,15,18].forEach(hh=>{
    const now=new Date(),t=new Date(now);t.setHours(hh,0,0,0);
    if(t<=now)t.setDate(t.getDate()+1);
    setTimeout(()=>{
      new Notification('Octopus',{body:'✨ Time to read your affirmations!'});
      setInterval(()=>new Notification('Octopus',{body:'✨ Read your affirmations!'}),86400000);
    },t-now);
  });
}

// INIT
// ============================================================
load();
if(S.darkMode){document.body.classList.add('dark');document.getElementById('darkBtn').textContent='☀️';}
if('Notification'in window){
  if(Notification.permission==='default'){
    Notification.requestPermission().then(p=>{if(p==='granted'){scheduleAffReminders();S.notifications.forEach(n=>scheduleNotif(n.time,n.message));}});
  } else if(Notification.permission==='granted'){
    scheduleAffReminders();S.notifications.forEach(n=>scheduleNotif(n.time,n.message));
  }
}
render();
setTimeout(checkFlows,900);

// ============================================================
// SERVICE WORKER — full offline support
// ============================================================
if('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'mpl-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
      e.waitUntil(caches.open(CACHE).then(c => c.addAll([self.location.href])));
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(cached => {
          if (cached) return cached;
          return fetch(e.request).then(res => {
            if (!res || res.status !== 200 || res.type === 'opaque') return res;
            const copy = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, copy));
            return res;
          }).catch(() => cached);
        })
      );
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swURL = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL).then(()=>console.log('Offline ready ✓')).catch(()=>{});
}

// PWA install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if(!window.matchMedia('(display-mode: standalone)').matches) {
    const banner = document.createElement('div');
    banner.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--accent2);color:white;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.25);white-space:nowrap';
    banner.textContent = '📲 Install as app — tap here';
    banner.onclick = () => { deferredPrompt.prompt(); banner.remove(); };
    document.body.appendChild(banner);
    setTimeout(() => { if(banner.parentNode) banner.remove(); }, 10000);
  }
});
