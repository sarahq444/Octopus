<style>
:root{--bg:#f5f0e8;--bg2:#fdf8f0;--bg3:#ede6d8;--text:#1a1a1a;--text2:#555;--text3:#999;--accent:#1a1a1a;--accent2:#c8a96e;--border:#ddd5c4;--done:#b0a898;--shadow:0 2px 24px rgba(0,0,0,.08);--radius:16px;--danger:#c0392b;--star:#f0b429;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;--serif:Georgia,'Times New Roman',serif;}
.theme-dark{--bg:#000;--bg2:#000;--bg3:#0d0d0d;--text:#f5f5f0;--text2:#aaa;--text3:#555;--accent:#f5f5f0;--accent2:#c8a96e;--border:#1e1e1e;--done:#444;--shadow:0 2px 24px rgba(0,0,0,.5);}
.theme-lavender{--bg:#1a1625;--bg2:#211d2e;--bg3:#2a253a;--text:#e8e4f0;--text2:#b8b0cc;--text3:#7a7290;--accent:#e8e4f0;--accent2:#b39ddb;--border:#3d3555;--done:#5a5270;--shadow:0 2px 24px rgba(0,0,0,.4);}
.theme-slate{--bg:#0f1318;--bg2:#161c23;--bg3:#1e252e;--text:#e2e8f0;--text2:#94a3b8;--text3:#475569;--accent:#e2e8f0;--accent2:#7eb8c9;--border:#2a3540;--done:#3a4a55;--shadow:0 2px 24px rgba(0,0,0,.5);}
.theme-forest{--bg:#0d1410;--bg2:#131a10;--bg3:#1a2318;--text:#e4ede0;--text2:#9ab890;--text3:#4a6645;--accent:#e4ede0;--accent2:#82b874;--border:#253020;--done:#3a5035;--shadow:0 2px 24px rgba(0,0,0,.5);}
.theme-rose{--bg:#1a1015;--bg2:#22141a;--bg3:#2c1c23;--text:#f0e4e8;--text2:#c49aaa;--text3:#7a5565;--accent:#f0e4e8;--accent2:#e8a0b0;--border:#3d2530;--done:#5a3545;--shadow:0 2px 24px rgba(0,0,0,.5);}
.theme-violet{--bg:#000;--bg2:#06040f;--bg3:#0e0920;--text:#ede8ff;--text2:#a89dd4;--text3:#5a5080;--accent:#ede8ff;--accent2:#8b77e8;--border:#1e1840;--done:#3d3460;--shadow:0 2px 24px rgba(0,0,0,.6);}
.theme-solar{--bg:#000;--bg2:#0a0800;--bg3:#141000;--text:#fff8e0;--text2:#d4b84a;--text3:#7a6a20;--accent:#fff8e0;--accent2:#f0c030;--border:#2a2000;--done:#3a3010;--shadow:0 2px 24px rgba(0,0,0,.6);}
.theme-pinkwhite{--bg:#fff;--bg2:#fff;--bg3:#fdf0f4;--text:#2a1a20;--text2:#8a5a6a;--text3:#c0a0aa;--accent:#2a1a20;--accent2:#e8608a;--border:#f0d0da;--done:#d4b0ba;--shadow:0 2px 24px rgba(220,100,130,.1);}
.theme-redblack{--bg:#000;--bg2:#080000;--bg3:#120000;--text:#ffe8e8;--text2:#cc7070;--text3:#7a3535;--accent:#ffe8e8;--accent2:#e03030;--border:#2a0808;--done:#3a1010;--shadow:0 2px 24px rgba(0,0,0,.6);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}
/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 18px 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.app-title{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--text);line-height:1.1;flex:1}
.header-menu-btn{background:none;border:none;cursor:pointer;font-size:22px;padding:4px 8px;color:var(--text2)}
/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px 16px 160px;scrollbar-width:none}
.content::-webkit-scrollbar{display:none}
/* SECTION LABEL */
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:1.8px;color:var(--text3);margin-bottom:12px;margin-top:22px;font-weight:600}
.section-label:first-child{margin-top:0}
/* TASK ITEMS */
.task-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:9px;cursor:grab;transition:box-shadow .2s,opacity .2s}
.task-item.star-task{border-color:var(--star);background:rgba(240,180,41,.05)}
.task-item.dragging{opacity:.4}
.task-item.drag-over{border-color:var(--accent2)}
.task-check{width:20px;height:20px;border-radius:4px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.task-check.done{background:var(--accent2);border-color:var(--accent2)}
.task-check.done::after{content:'✓';color:white;font-size:11px;font-weight:700}
.task-text{flex:1;font-size:15px;line-height:1.4;color:var(--text);word-break:break-word}
.task-text.done{text-decoration:line-through;color:var(--done)}
.task-meta{font-size:11px;color:var(--text3);margin-top:2px}
.task-action-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:3px 4px;border-radius:6px;transition:color .2s}
.drag-handle{color:var(--text3);font-size:13px;cursor:grab;flex-shrink:0}
/* STAR BUTTON */
.star-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:3px 4px;opacity:.4;transition:opacity .2s,transform .15s}
.star-btn.starred{opacity:1;transform:scale(1.1)}
/* ADD BAR */
.add-bar{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;align-items:center;z-index:200}
.add-input{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:14px;padding:12px 15px;font-size:16px;color:var(--text);font-family:var(--font);outline:none;transition:border-color .2s}
.add-input:focus{border-color:var(--accent2)}
.add-input::placeholder{color:var(--text3)}
.add-btn{background:var(--accent);color:var(--bg2);border:none;border-radius:14px;padding:12px 18px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font)}
/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:300;height:72px;padding:0 2px}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;padding:6px 2px;font-family:var(--font)}
.nav-icon{font-size:20px;line-height:1;transition:transform .15s}
.nav-label{font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:#bbb;transition:color .15s}
.nav-btn.active .nav-label{color:var(--accent2)}
.nav-btn.active .nav-icon{transform:scale(1.15)}
/* CHIPS */
.category-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:6px 13px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);color:var(--text2);background:var(--bg2);transition:all .15s;display:flex;align-items:center;gap:4px}
.chip.active{background:var(--accent);color:var(--bg2);border-color:var(--accent)}
.chip-x{font-size:10px;opacity:.5}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:24px 24px 0 0;padding:26px 20px 44px;width:100%;max-width:480px;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:44px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:var(--serif);font-size:21px;font-weight:700;margin-bottom:18px}
.modal-input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:13px 15px;font-size:16px;color:var(--text);font-family:var(--font);outline:none;transition:border-color .2s;margin-bottom:12px;resize:vertical;min-height:46px}
.modal-input:focus{border-color:var(--accent2)}
.modal-btn{width:100%;padding:15px;border-radius:14px;border:none;font-size:16px;font-weight:600;cursor:pointer;font-family:var(--font);margin-bottom:9px;transition:opacity .2s}
.modal-btn.primary{background:var(--accent);color:var(--bg2)}
.modal-btn.secondary{background:var(--bg3);color:var(--text)}
.modal-btn.danger{background:var(--danger);color:white}
/* PROGRESS */
.progress-bar{background:var(--bg3);border-radius:6px;height:6px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent2);border-radius:6px;transition:width .4s ease}
/* SUB TABS */
.sub-tabs{display:flex;margin-bottom:16px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;gap:0}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{padding:9px 15px;font-size:13px;font-weight:600;color:var(--text3);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2.5px solid transparent;transition:all .2s;font-family:var(--font)}
.sub-tab.active{color:var(--accent2);border-bottom-color:var(--accent2)}
/* FLOW */
.flow-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 22px;text-align:center;overflow-y:auto}
@keyframes fi{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.flow-inner{animation:fi .3s ease;display:flex;flex-direction:column;align-items:center;width:100%;max-width:400px}
.flow-icon{font-size:50px;margin-bottom:18px}
.flow-title{font-family:var(--serif);font-size:25px;font-weight:700;margin-bottom:10px;line-height:1.3}
.flow-subtitle{font-size:15px;color:var(--text2);margin-bottom:24px;line-height:1.6}
.flow-btn{width:100%;max-width:340px;padding:16px;border-radius:16px;border:none;font-size:16px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .2s;margin-bottom:11px}
.flow-btn.primary{background:var(--accent);color:var(--bg2)}
.flow-btn.secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.flow-input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:13px 15px;font-size:16px;color:var(--text);font-family:var(--font);outline:none;resize:none;margin-bottom:13px}
.flow-input:focus{border-color:var(--accent2)}
.flashcard{width:100%;max-width:340px;min-height:190px;background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:30px 22px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:20px;line-height:1.5;font-family:var(--serif);box-shadow:var(--shadow);margin-bottom:22px;cursor:pointer;transition:transform .15s}
.flashcard:active{transform:scale(.98)}
/* HP CARD */
.hp-card{background:linear-gradient(135deg,rgba(200,169,110,.13),rgba(200,169,110,.03));border:1px solid rgba(200,169,110,.35);border-radius:var(--radius);padding:16px;margin-bottom:18px}
.hp-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent2);font-weight:700;margin-bottom:10px}
.bullet-item{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)}
.bullet-item:last-child{border-bottom:none}
.bullet-dot{font-size:15px;flex-shrink:0}
.bullet-text{flex:1;font-size:15px;line-height:1.45;color:var(--text)}
.bullet-text.done{text-decoration:line-through;color:var(--done)}
.bullet-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:2px}
.bullet-edit{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:2px}
/* AOD */
.aod-card{background:linear-gradient(135deg,rgba(200,169,110,.15),rgba(200,169,110,.04));border:1px solid rgba(200,169,110,.4);border-radius:18px;padding:18px;margin-bottom:16px;text-align:center;cursor:pointer}
.aod-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--accent2);font-weight:700;margin-bottom:8px}
.aod-text{font-family:var(--serif);font-size:16px;line-height:1.6;color:var(--text);font-style:italic}
/* GRATITUDE */
.gratitude-entry{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.gratitude-date{font-size:11px;color:var(--accent2);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.gratitude-text{font-size:14px;line-height:1.6;color:var(--text)}
/* SIDEBAR */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;opacity:0;pointer-events:none;transition:opacity .25s}
.sidebar-overlay.open{opacity:1;pointer-events:all}
.sidebar{position:fixed;top:0;right:0;bottom:0;width:80%;max-width:300px;background:var(--bg2);z-index:700;transform:translateX(100%);transition:transform .3s cubic-bezier(.25,.8,.25,1);padding:0;overflow-y:auto;display:flex;flex-direction:column}
.sidebar.open{transform:translateX(0)}
.sidebar-header{padding:50px 22px 18px;border-bottom:1px solid var(--border)}
.sidebar-title{font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:2px}
.sidebar-name{font-size:13px;color:var(--text3)}
.sidebar-item{display:flex;align-items:center;gap:14px;padding:16px 22px;border-bottom:1px solid var(--border);cursor:pointer;font-size:15px;font-weight:500;color:var(--text);background:none;border-left:none;border-right:none;border-top:none;width:100%;text-align:left;font-family:var(--font);transition:background .15s}
.sidebar-item:hover{background:var(--bg3)}
.sidebar-icon{font-size:20px;width:28px;text-align:center}
/* TRACKERS */
.tracker-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.tracker-name{font-size:16px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.tracker-count{font-size:28px;font-weight:700;color:var(--accent2);text-align:center;margin:6px 0}
.tracker-unit{font-size:12px;color:var(--text3);text-align:center;margin-bottom:10px}
.tracker-btns{display:flex;gap:8px}
.tracker-btn{flex:1;padding:10px;border-radius:10px;border:none;font-size:20px;cursor:pointer;font-family:var(--font);font-weight:700;transition:opacity .15s}
/* LOOP TAB */
.loop-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;margin-bottom:9px;display:flex;align-items:center;gap:10px}
.loop-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.loop-check.done{background:var(--accent2);border-color:var(--accent2)}
.loop-check.done::after{content:'✓';color:white;font-size:12px;font-weight:700}
.loop-text{flex:1;font-size:16px;color:var(--text)}
.loop-text.done{text-decoration:line-through;color:var(--done)}
/* MISC */
.empty{text-align:center;padding:44px 20px;color:var(--text3)}
.empty-icon{font-size:38px;margin-bottom:10px}
.empty-text{font-size:15px}
.notif-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
.notif-time{font-size:13px;font-weight:700;color:var(--accent2);min-width:52px}
.notif-msg{font-size:14px;color:var(--text);flex:1}
.history-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:9px}
.history-task{font-size:14px;color:var(--done);text-decoration:line-through}
.history-date{font-size:11px;color:var(--text3);margin-top:3px;display:flex;align-items:center;justify-content:space-between}
/* CUTE PHRASES */
.cute-phrase{text-align:center;font-size:13px;color:var(--text3);padding:6px 0 2px;font-style:italic}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <span class="app-title" id="appTitle">Octopus</span>
    <button class="header-menu-btn" onclick="openSidebar()" title="Menu">⋯</button>
  </div>
  <div class="content" id="mainContent"></div>
  <div class="add-bar" id="addBar">
    <input class="add-input" id="addInput" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTask()">
    <button class="add-btn" onclick="addTask()">Add</button>
  </div>
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<!-- SIDEBAR -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">🐙 Octopus</div>
    <div class="sidebar-name" id="sidebarName">Hi there!</div>
  </div>
  <button class="sidebar-item" onclick="closeSidebar();switchTab('today');setTimeout(()=>addHPItem(),200)"><span class="sidebar-icon">🌟</span> Happiness Plan</button>
  <button class="sidebar-item" onclick="closeSidebar();openAffirmations()"><span class="sidebar-icon">✨</span> Affirmations</button>
  <button class="sidebar-item" onclick="closeSidebar();openMoodShifters()"><span class="sidebar-icon">🎈</span> Mood Shifters</button>
  <button class="sidebar-item" onclick="closeSidebar();openWinsSection()"><span class="sidebar-icon">🏆</span> Wins</button>
  <button class="sidebar-item" onclick="closeSidebar();openGratitudeHistory()"><span class="sidebar-icon">🙏</span> Gratitude</button>
  <button class="sidebar-item" onclick="closeSidebar();openHistory()"><span class="sidebar-icon">📋</span> History</button>
  <button class="sidebar-item" onclick="closeSidebar();openNotifManager()"><span class="sidebar-icon">🔔</span> Notifications</button>
  <button class="sidebar-item" onclick="closeSidebar();openThemePicker()"><span class="sidebar-icon">🎨</span> Theme</button>
  <button class="sidebar-item" onclick="closeSidebar();openProfile()"><span class="sidebar-icon">👤</span> My Profile</button>
  <button class="sidebar-item" onclick="closeSidebar();openTabOrder()"><span class="sidebar-icon">⇅</span> Reorder Tabs</button>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>
<div class="flow-screen" id="flowScreen" style="display:none"></div>

<script>
// ============================================================
// STATE
// ============================================================
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const CUTE_PHRASES=["Let's get this bread 🍞","Fighting! 💪","Shall we celebrate? 🤸🏻‍♀️","Soft life loading... 🫧","Go off bestie 🔥","Slay 👑","We move! 🚀","Built different 💎","Winning szn 🏆","Standing on business 💻","Booked and busy 🐙","You egg! 🥚"];

let S={
  tasks:{today:[],weekly:[],yearly:[],backlog:[]},
  monthlyTasks:{},        // {Jan:[],Feb:[],...}
  categories:['Personal','Work','Health','Family'],
  yearlySubTabs:['Goals'],
  affirmations:[],
  affCategories:['General'],
  affirmationOfDay:null,
  affCardIdx:0,
  notifications:[],
  history:[],
  theme:'light',
  currentTab:'today',
  currentYearlySub:'Goals',
  currentMonth: MONTHS[new Date().getMonth()],
  currentCategory:'All',
  lastMorningFlow:null,
  lastEveningFlow:null,
  gratitude:[],
  moodShifters:[],
  wins:[],
  happinessPlan:[],
  lastHPDate:null,
  yearlyMeta:{},
  userName:'',
  // LOOP (routine - lives in Today tab now)
  loopItems:[],
  lastLoopReset:null,
  // PROJECTS
  projects:[],
  openProjects:{},
  currentProjectIdx:0,
  // STAR (priority task)
  starredTasks:[],
  tabOrder:['today','monthly','yearly','projects','backlog'],
};

const CCOLORS={Personal:'#c8a96e',Work:'#5b8dee',Health:'#27ae60',Family:'#e74c3c'};
const cc=c=>CCOLORS[c]||'#9b59b6';
const td=()=>new Date().toDateString();
const h=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid=()=>Math.random().toString(36).slice(2,9);

function save(){try{localStorage.setItem('octopus_v3',JSON.stringify(S))}catch(e){}}
function load(){
  try{
    const s=localStorage.getItem('octopus_v3');
    if(s){const d=JSON.parse(s);S={...S,...d};}
    // migrate old key
    if(!s){const old=localStorage.getItem('mpl3');if(old){const d=JSON.parse(old);S={...S,...d};}}
  }catch(e){}
  // migrate old darkMode to theme
  if(S.darkMode&&S.theme==='light')S.theme='dark';
  S.tabOrder=S.tabOrder.filter(t=>ALL_TABS.includes(t));
  ALL_TABS.forEach(t=>{if(!S.tabOrder.includes(t))S.tabOrder.push(t);});
  if(S.currentTab==='trackers'||S.currentTab==='loop'||S.currentTab==='weekly')S.currentTab='today';
}

// ============================================================
// SIDEBAR
// ============================================================
function openSidebar(){
  document.getElementById('sidebarOverlay').classList.add('open');
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarName').textContent=S.userName?`Hey ${S.userName} 👋`:'Hey there 👋';
}
function closeSidebar(){
  document.getElementById('sidebarOverlay').classList.remove('open');
  document.getElementById('sidebar').classList.remove('open');
}

// ============================================================
// TABS
// ============================================================
const TAB_META={
  today:{icon:'☀️',label:'Today'},
  monthly:{icon:'🗓️',label:'Month'},
  yearly:{icon:'🎯',label:'Year'},
  projects:{icon:'🗂️',label:'Projects'},
  backlog:{icon:'🗒️',label:'Backlog'},
};
const ALL_TABS=['today','monthly','yearly','projects','backlog'];
const NO_ADD_BAR=['projects'];

function renderNav(){
  if(!S.tabOrder||S.tabOrder.length!==ALL_TABS.length)S.tabOrder=[...ALL_TABS];
  const nav=document.getElementById('bottomNav');
  nav.innerHTML=S.tabOrder.map((tab,i)=>{
    const m=TAB_META[tab];if(!m)return'';
    return`<button class="nav-btn ${S.currentTab===tab?'active':''}" id="nav-${tab}"
      onclick="switchTab('${tab}')"
      draggable="true"
      ondragstart="navDragStart(event,${i})"
      ondragover="navDragOver(event,${i})"
      ondrop="navDrop(event,${i})"
      ondragend="navDragEnd()"
      style="position:relative">
      <span class="nav-icon">${m.icon}</span>
      <span class="nav-label">${m.label}</span>
    </button>`;
  }).join('');
}

let _navDragFrom=null;
function navDragStart(e,i){
  _navDragFrom=i;
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.style.opacity='0.4';
  // prevent tab switch on drag
  e.stopPropagation();
}
function navDragOver(e,i){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
}
function navDrop(e,i){
  e.preventDefault();
  if(_navDragFrom===null||_navDragFrom===i)return;
  const order=[...S.tabOrder];
  const [moved]=order.splice(_navDragFrom,1);
  order.splice(i,0,moved);
  S.tabOrder=order;
  _navDragFrom=null;
  save();renderNav();
}
function navDragEnd(){
  _navDragFrom=null;
  document.querySelectorAll('.nav-btn').forEach(b=>b.style.opacity='');
}

function switchTab(tab){
  S.currentTab=tab;
  document.getElementById('addBar').style.display=NO_ADD_BAR.includes(tab)?'none':'flex';
  renderNav();
  render();
}

// ============================================================
// RENDER
// ============================================================
function render(){
  renderNav();
  const c=document.getElementById('mainContent');
  const titleEl=document.getElementById('appTitle');
  if(titleEl&&S.userName) titleEl.textContent=getGreeting();
  checkLoopReset();
  if(S.currentTab==='today') renderToday(c);
  else if(S.currentTab==='monthly') renderMonthly(c);
  else if(S.currentTab==='yearly') renderYearly(c);
  else if(S.currentTab==='projects') renderProjects(c);
  else if(S.currentTab==='backlog') renderList(c,'backlog','Backlog — tasks for later');
  else if(S.currentTab==='weekly') renderList(c,'weekly','Weekly');
}

// ============================================================
// RENDER TODAY
// ============================================================
function renderToday(c){
  let tasks=S.tasks.today||[];
  const done=tasks.filter(t=>t.done).length;
  const total=tasks.length;
  const pct=total?Math.round(done/total*100):0;

  // Affirmation flashcard
  if(!S.affCardIdx)S.affCardIdx=0;
  let aodHTML='';
  if(S.affirmations.length){
    const idx=S.affCardIdx%S.affirmations.length;
    const aff=S.affirmations[idx];
    aodHTML=`<div class="aod-card" style="cursor:default;padding:20px 18px 14px">
      <div class="aod-label">✨ Affirmations <span style="opacity:.5;font-size:10px">${idx+1}/${S.affirmations.length}</span></div>
      <div class="aod-text" style="min-height:54px;display:flex;align-items:center;justify-content:center">${h(aff.text||aff)}</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:14px">
        <button onclick="affPrev()" style="background:none;border:1.5px solid var(--border);border-radius:50%;width:36px;height:36px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0">‹</button>
        <button onclick="affShuffle()" style="background:none;border:1.5px solid var(--border);border-radius:20px;padding:0 14px;height:36px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);font-family:inherit;letter-spacing:.5px">shuffle</button>
        <button onclick="affNext()" style="background:none;border:1.5px solid var(--border);border-radius:50%;width:36px;height:36px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0">›</button>
      </div>
    </div>`;
  }

  // Happiness plan
  // Happiness plan — always show
  const plan=S.happinessPlan||[];
  const hpHTML=`<div class="hp-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="hp-title" style="margin-bottom:0">🌟 Happiness Plan</div>
      <button onclick="addHPItem()" style="background:none;border:1.5px solid var(--accent2);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:600;color:var(--accent2);cursor:pointer;font-family:inherit">+ Add</button>
    </div>
    ${plan.length?plan.map((p,i)=>`<div class="bullet-item">
      <div class="bullet-dot">${p.isTask?'○':'•'}</div>
      <div class="bullet-text ${p.done?'done':''}">${h(p.text)}</div>
      ${p.isTask?`<div class="task-check ${p.done?'done':''}" style="width:18px;height:18px;flex-shrink:0" onclick="toggleHP(${i})"></div>`:''}
      <button class="task-action-btn" style="font-size:16px;padding:1px 5px" onclick="openHPMenu(${i})">⋯</button>
    </div>`).join(''):`<div style="font-size:13px;color:var(--text3);text-align:center;padding:10px 0">What will make today great? Add a few things ✨</div>`}
  </div>`;

  // Cute phrase
  const phrase=CUTE_PHRASES[new Date().getDay()%CUTE_PHRASES.length];

  // Separate starred from normal
  const starred=tasks.filter(t=>t.starred&&!t.done);
  const normal=tasks.filter(t=>!t.starred);

  // Routine section
  const routineItems=S.loopItems||[];
  // counter items count as done when count >= target
  const rDone=routineItems.filter(i=>i.type==='counter'?i.count>=(i.target||1):i.done).length;
  const rPct=routineItems.length?Math.round(rDone/routineItems.length*100):0;
  const routineHTML=`
    <div style="margin-top:28px;padding-top:20px;border-top:1px solid var(--border)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="section-label" style="margin:0">🔁 Routine</div>
        <div style="font-size:12px;color:var(--text3)">${rDone}/${routineItems.length}${rPct===100&&routineItems.length?' 🎉':''}</div>
      </div>
      ${routineItems.length?`<div class="progress-bar" style="margin-bottom:12px"><div class="progress-fill" style="width:${rPct}%"></div></div>`:''}
      <div id="loopList">${routineItems.map((item,i)=>{
        const isDone=item.type==='counter'?item.count>=(item.target||1):item.done;
        if(item.type==='counter'){
          const cnt=item.count||0;const tgt=item.target||1;
          return`<div class="loop-item" data-idx="${i}">
            <span style="color:var(--text3);font-size:15px;cursor:grab;flex-shrink:0">⠿</span>
            <div class="loop-text ${isDone?'done':''}" style="flex:1">${h(item.text)}</div>
            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
              <button onclick="adjLoop(${i},-1)" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);font-size:16px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;line-height:1">−</button>
              <span style="font-size:13px;font-weight:700;color:${isDone?'var(--accent2)':'var(--text)'};min-width:36px;text-align:center">${cnt}/${tgt}</span>
              <button onclick="adjLoop(${i},1)" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);font-size:16px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;line-height:1">+</button>
            </div>
            <button class="task-action-btn" style="font-size:18px;padding:2px 6px;margin-left:4px" onclick="openLoopMenu(${i})">⋯</button>
          </div>`;
        }
        return`<div class="loop-item" data-idx="${i}">
          <span style="color:var(--text3);font-size:15px;cursor:grab;flex-shrink:0">⠿</span>
          <div class="loop-check ${isDone?'done':''}" onclick="toggleLoop(${i})"></div>
          <div class="loop-text ${isDone?'done':''}">${h(item.text)}</div>
          <button class="task-action-btn" style="font-size:18px;padding:2px 6px" onclick="openLoopMenu(${i})">⋯</button>
        </div>`;
      }).join('')}</div>
      ${!routineItems.length?`<div style="font-size:13px;color:var(--text3);text-align:center;padding:10px 0">No routine tasks yet</div>`:''}
      <div style="display:flex;gap:8px;margin-top:12px">
        <input class="add-input" id="loopInput" placeholder="Add routine task..." onkeydown="if(event.key==='Enter')addLoopItem()" style="flex:1;font-size:14px;padding:10px 14px">
        <button class="add-btn" onclick="addLoopItem()" style="padding:10px 16px">Add</button>
      </div>
    </div>`;

  c.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:13px;font-weight:600;color:var(--text2)">${done}/${total} done</div>
      <div style="font-size:13px;font-weight:700;color:var(--accent2)">${pct}%</div>
    </div>
    <div class="progress-bar" style="margin-bottom:16px"><div class="progress-fill" style="width:${pct}%"></div></div>
    ${aodHTML}${hpHTML}
    ${starred.length?`<div class="section-label">⭐ Priority</div>
    <div id="starList">${starred.map((t)=>taskHTML(t,tasks.indexOf(t),'today')).join('')}</div>`:''}
    <div class="section-label">${total===done&&total>0?'All done 🎉 ':''}Tasks</div>
    <div class="cute-phrase" style="margin-bottom:10px">${phrase}</div>
    <div id="taskList">${normal.length?normal.map((t)=>taskHTML(t,tasks.indexOf(t),'today')).join(''):emptyHTML("You're ahead of the game. Add something!")}</div>
    ${routineHTML}`;
  initDrag('today');
  initDragAny('#loopList',S.loopItems,()=>{save();render();});
}

// ============================================================
// AFFIRMATION FLASHCARD (inline on Today)
// ============================================================
function affNext(){
  if(!S.affirmations.length)return;
  S.affCardIdx=((S.affCardIdx||0)+1)%S.affirmations.length;
  save();render();
}
function affPrev(){
  if(!S.affirmations.length)return;
  S.affCardIdx=((S.affCardIdx||0)-1+S.affirmations.length)%S.affirmations.length;
  save();render();
}
function affShuffle(){
  if(S.affirmations.length<2)return;
  let next;
  do{next=Math.floor(Math.random()*S.affirmations.length);}while(next===(S.affCardIdx||0));
  S.affCardIdx=next;
  save();render();
}

// ============================================================
// ============================================================
function renderList(c,tab,label){
  const tasks=S.tasks[tab]||[];
  const done=tasks.filter(t=>t.done).length;
  c.innerHTML=`<div class="section-label">${label} — ${done}/${tasks.length} done</div>
    <div id="taskList">${tasks.length?tasks.map((t,i)=>taskHTML(t,i,tab)).join(''):emptyHTML('Nothing here yet.')}</div>`;
  initDrag(tab);
}

// ============================================================
// RENDER MONTHLY (per-month sub-tabs)
// ============================================================
function renderMonthly(c){
  if(!S.monthlyTasks)S.monthlyTasks={};
  const mon=S.currentMonth||MONTHS[new Date().getMonth()];
  if(!S.monthlyTasks[mon])S.monthlyTasks[mon]=[];
  const tasks=S.monthlyTasks[mon];
  const done=tasks.filter(t=>t.done).length;

  c.innerHTML=`
    <div class="sub-tabs" id="monthSubTabs">
      ${MONTHS.map(m=>`<button class="sub-tab ${m===mon?'active':''}" onclick="switchMonth('${m}')">${m.slice(0,3)}</button>`).join('')}
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:13px;font-weight:600;color:var(--text2)">${mon} — ${done}/${tasks.length}</div>
      <div style="font-size:13px;font-weight:700;color:var(--accent2)">${tasks.length?Math.round(done/tasks.length*100):0}%</div>
    </div>
    <div class="progress-bar" style="margin-bottom:14px"><div class="progress-fill" style="width:${tasks.length?Math.round(done/tasks.length*100):0}%"></div></div>
    <div id="taskList">${tasks.length?tasks.map((t,i)=>taskHTML(t,i,'monthly_'+mon)).join(''):emptyHTML(`No tasks for ${mon} yet.`)}</div>`;
  initDragMonthly(mon);
}

function switchMonth(m){S.currentMonth=m;save();render();}

function initDragMonthly(mon){
  const key='monthly_'+mon;

// RENDER YEARLY
// ============================================================
function renderYearly(c){
  const subs=S.yearlySubTabs;
  const active=S.currentYearlySub;

  let inner='';
  if(active==='Goals'){
    const tasks=S.tasks.yearly||[];
    const done=tasks.filter(t=>t.done).length;
    const pct=tasks.length?Math.round(done/tasks.length*100):0;
    inner=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:13px;font-weight:600;color:var(--text2)">${done}/${tasks.length} goals done</div>
        <div style="font-size:13px;font-weight:700;color:var(--accent2)">${pct}%</div>
      </div>
      <div class="progress-bar" style="margin-bottom:16px"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div id="taskList">${tasks.length?tasks.map((t,i)=>taskHTML(t,i,'yearly')).join(''):emptyHTML('Set your big goals for the year. Dream big.')}</div>`;
  } else {
    const key='yearly_'+active;
    if(!S.tasks[key])S.tasks[key]=[];
    const items=S.tasks[key];
    const meta=S.yearlyMeta?.[active]||{};
    let trackerHTML='';
    if(meta.total){
      const dn=meta.done||0;const pct=Math.round(dn/meta.total*100);
      trackerHTML=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:13px;font-weight:600">${dn}/${meta.total} ${h(meta.unit||'items')}</span>
          <span style="font-size:12px;color:var(--accent2);font-weight:600">${pct}%</span>
        </div>
        <div class="progress-bar" style="margin-bottom:10px"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="display:flex;gap:8px">
          <button onclick="yearTrackerAdj('${active}',-1)" style="flex:1;padding:9px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:18px;cursor:pointer">−</button>
          <button onclick="yearTrackerAdj('${active}',1)" style="flex:1;padding:9px;background:var(--accent2);border:none;border-radius:8px;font-size:18px;cursor:pointer;color:white">+</button>
          <button onclick="editYearTracker('${active}')" style="padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;color:var(--text2)">Edit</button>
        </div>
      </div>`;
    } else {
      trackerHTML=`<button onclick="addYearTracker('${active}')" style="width:100%;margin-bottom:12px;padding:10px;background:none;border:1px dashed var(--border);border-radius:10px;font-size:13px;color:var(--text3);cursor:pointer;font-family:inherit">+ Add progress tracker (optional)</button>`;
    }
    const done=items.filter(t=>t.done).length;
    inner=`${trackerHTML}<div class="section-label">${done}/${items.length} done</div>
      <div id="taskList">${items.length?items.map((t,i)=>taskHTML(t,i,key)).join(''):emptyHTML('Add items to track.')}</div>`;
  }

  c.innerHTML=`
    <div class="sub-tabs">
      ${subs.map(s=>`<button class="sub-tab ${s===active?'active':''}" onclick="switchYearlySub('${s}')">${h(s)}</button>`).join('')}
      <button class="sub-tab" onclick="addYearlySubTab()">+</button>
      ${active!=='Goals'?`<button class="sub-tab" onclick="manageYearlySub('${active}')">✏️</button>`:''}
    </div>
    ${inner}`;
  if(active==='Goals') initDrag('yearly');
  else initDragGeneric('yearly_'+active,(fi,ti)=>{const arr=S.tasks['yearly_'+active];const[m]=arr.splice(fi,1);arr.splice(ti,0,m);save();render();});
}

// RENDER LOOP (still used - now lives in Today tab)
// ============================================================
function checkLoopReset(){
  if(!S.loopItems||!S.loopItems.length)return;
  const now=new Date();
  const lastReset=S.lastLoopReset?new Date(S.lastLoopReset):null;
  const todayReset=new Date(now);todayReset.setHours(2,0,0,0);
  if(now>=todayReset&&(!lastReset||lastReset<todayReset)){
    S.loopItems.forEach(item=>{item.done=false;if(item.type==='counter')item.count=0;});
    S.lastLoopReset=now.toISOString();save();
  }
}
function addLoopItem(){
  const inp=document.getElementById('loopInput');
  const t=inp.value.trim();if(!t)return;
  if(!S.loopItems)S.loopItems=[];
  // Open modal to choose type
  inp.value='';
  openModal(`<div class="modal-handle"></div><div class="modal-title">New Routine Item</div>
    <input class="modal-input" id="loopTxt" placeholder="Name..." value="${h(t)}" style="width:100%">
    <div style="font-size:13px;color:var(--text3);margin-bottom:8px">Type</div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button id="typeCkBtn" onclick="loopTypeSelect('checkbox')" style="flex:1;padding:11px;border-radius:10px;border:2px solid var(--accent2);background:var(--accent2);color:#fff;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600">☑ Checkbox</button>
      <button id="typeCtBtn" onclick="loopTypeSelect('counter')" style="flex:1;padding:11px;border-radius:10px;border:2px solid var(--border);background:var(--bg3);color:var(--text2);font-size:14px;cursor:pointer;font-family:inherit">🔢 Counter</button>
    </div>
    <div id="counterFields" style="display:none">
      <input class="modal-input" id="loopTarget" type="number" min="1" placeholder="Target (e.g. 8 for 8 glasses of water)" style="width:100%">
    </div>
    <button class="modal-btn primary" onclick="saveNewLoopItem()">Add</button>
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>`);
}
let _loopType='checkbox';
function loopTypeSelect(type){
  _loopType=type;
  document.getElementById('typeCkBtn').style.cssText=`flex:1;padding:11px;border-radius:10px;border:2px solid ${type==='checkbox'?'var(--accent2)':'var(--border)'};background:${type==='checkbox'?'var(--accent2)':'var(--bg3)'};color:${type==='checkbox'?'#fff':'var(--text2)'};font-size:14px;cursor:pointer;font-family:inherit;font-weight:${type==='checkbox'?'600':'400'}`;
  document.getElementById('typeCtBtn').style.cssText=`flex:1;padding:11px;border-radius:10px;border:2px solid ${type==='counter'?'var(--accent2)':'var(--border)'};background:${type==='counter'?'var(--accent2)':'var(--bg3)'};color:${type==='counter'?'#fff':'var(--text2)'};font-size:14px;cursor:pointer;font-family:inherit;font-weight:${type==='counter'?'600':'400'}`;
  document.getElementById('counterFields').style.display=type==='counter'?'block':'none';
}
function saveNewLoopItem(){
  const text=document.getElementById('loopTxt').value.trim();if(!text)return;
  if(_loopType==='counter'){
    const target=parseInt(document.getElementById('loopTarget').value)||1;
    S.loopItems.push({id:uid(),text,type:'counter',target,count:0});
  } else {
    S.loopItems.push({id:uid(),text,type:'checkbox',done:false});
  }
  save();closeModal();render();
}
function toggleLoop(i){S.loopItems[i].done=!S.loopItems[i].done;save();render();}
function adjLoop(i,d){
  const item=S.loopItems[i];
  item.count=Math.max(0,Math.min((item.count||0)+d,item.target||1));
  save();render();
}
function delLoopItem(i){S.loopItems.splice(i,1);save();render();}
function editLoopItem(i){
  const item=S.loopItems[i];
  if(item.type==='counter'){
    openModal(`<div class="modal-handle"></div><div class="modal-title">Edit Counter</div>
      <input class="modal-input" id="elt" value="${h(item.text)}" style="width:100%" placeholder="Name...">
      <input class="modal-input" id="eltgt" type="number" min="1" value="${item.target||1}" style="width:100%" placeholder="Target">
      <button class="modal-btn primary" onclick="saveLoopEdit(${i})">Save</button>
      <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>`);
  } else {
    openModal(`<div class="modal-handle"></div><div class="modal-title">Edit Routine Task</div>
      <input class="modal-input" id="elt" value="${h(item.text)}" style="width:100%">
      <button class="modal-btn primary" onclick="saveLoopEdit(${i})">Save</button>
      <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>`);
  }
}
function openLoopMenu(i){
  openModal(`<div class="modal-handle"></div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:14px;font-style:italic">"${h(S.loopItems[i]?.text||'')}"</div>

}

function renderProjects(c){
  if(!S.projects)S.projects=[];
  if(!S.openProjects)S.openProjects={};
  const projs=S.projects;

  let html=`<div class="section-label">Projects</div>`;

  if(!projs.length){
    html+=emptyHTML('Your projects live here. Client work, creative goals, anything with tasks...');
  } else {
    html+=projs.map((proj,pi)=>{
      // migrate old stage-based projects
      if(!proj.tasks){
        proj.tasks=proj.stages?proj.stages.flatMap(s=>s.tasks||[]):[];
        delete proj.stages;
      }
      const tasks=proj.tasks||[];
      const done=tasks.filter(t=>t.done).length;
      const pct=tasks.length?Math.round(done/tasks.length*100):0;
      const isOpen=!!S.openProjects[proj.id];

      const taskListHTML=tasks.map((t,i)=>`<div class="task-item" data-idx="${i}" style="margin-bottom:7px">
        <span style="color:var(--text3);font-size:15px;cursor:grab;flex-shrink:0">⠿</span>

        <div style="flex:1;min-width:0"><div class="task-text ${t.done?'done':''}">${h(t.text)}</div></div>
        <button class="task-action-btn" style="font-size:18px;padding:2px 6px" onclick="openProjTaskMenu(${pi},${i})">⋯</button>
      </div>`).join('');

      return`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden">
        <div onclick="toggleProjectDrawer('${proj.id}')" style="display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer">
          <span style="font-size:13px;color:var(--text3);flex-shrink:0">${isOpen?'▾':'▸'}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px">${h(proj.name)}</div>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden">
                <div style="height:100%;width:${pct}%;background:var(--accent2);border-radius:3px;transition:width .3s"></div>
              </div>
              <span style="font-size:12px;font-weight:700;color:var(--accent2);flex-shrink:0">${pct}%</span>
            </div>
          </div>
          <button class="task-action-btn" style="font-size:18px;padding:2px 6px;flex-shrink:0" onclick="event.stopPropagation();openProjectMenu(${pi})">⋯</button>
        </div>
        ${isOpen?`<div style="padding:0 16px 16px" id="projDrawer_${pi}">
          <textarea class="modal-input" placeholder="notes..." rows="2"
            style="width:100%;resize:none;margin-bottom:12px;font-size:13px;color:var(--text2);background:var(--bg3)"
            oninput="S.projects[${pi}].note=this.value;save()">${h(proj.note||'')}</textarea>
          <div id="projTaskList_${pi}">${taskListHTML}</div>
          ${!tasks.length?`<div style="font-size:13px;color:var(--text3);text-align:center;padding:8px 0 12px">No tasks yet</div>`:''}
          <div style="display:flex;gap:8px;margin-top:10px">
            <input class="add-input" id="projTaskInput_${pi}" placeholder="Add task..." onkeydown="if(event.key==='Enter')addProjTask(${pi})" style="flex:1;font-size:14px;padding:10px 14px">
            <button class="add-btn" onclick="addProjTask(${pi})" style="padding:10px 16px">Add</button>
          </div>
        </div>`:''}
      </div>`;
    }).join('');
  }

  html+=`<div style="margin-top:8px"><button onclick="openAddProject()" style="width:100%;padding:14px;background:none;border:2px dashed var(--border);border-radius:var(--radius);font-size:15px;color:var(--text2);cursor:pointer;font-family:inherit;font-weight:600">+ New Project</button></div>`;
  c.innerHTML=html;

  // init drag for each open project
  projs.forEach((proj,pi)=>{
    if(S.openProjects[proj.id]){
      initDragAny(`#projTaskList_${pi}`,proj.tasks,()=>{save();renderProjects(c);});
    }
  });

function taskHTML(t,i,tab){
  const isStarred=t.starred||false;
  const hasTracker=t.tracker&&t.tracker.target;
  const trackerHTML=hasTracker?`<div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
    <button onclick="adjTaskTracker('${tab}',${i},-1)" style="width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);font-size:13px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0">−</button>
    <span style="font-size:11px;font-weight:700;color:${t.tracker.count>=(t.tracker.target)?'var(--accent2)':'var(--text3)'};min-width:28px;text-align:center">${t.tracker.count||0}/${t.tracker.target}</span>
    <button onclick="adjTaskTracker('${tab}',${i},1)" style="width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);font-size:13px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0">+</button>
  </div>`:'';
  return`<div class="task-item ${isStarred?'star-task':''}" draggable="true" data-index="${i}" data-tab="${tab}">
    <span style="color:var(--text3);font-size:15px;cursor:grab;flex-shrink:0;padding-right:2px">⠿</span>
    <div class="task-check ${t.done?'done':''}" onclick="toggleTask('${tab}',${i})"></div>
    <div style="flex:1;min-width:0">
      <div class="task-text ${t.done?'done':''}">${h(t.text)}</div>
    </div>
    <div style="display:flex;gap:4px;align-items:center;flex-shrink:0">
      ${trackerHTML}
      ${tab==='today'?`<button class="star-btn ${isStarred?'starred':''}" onclick="toggleStar('${tab}',${i})">${isStarred?'⭐':'☆'}</button>`:''}
      <button class="task-action-btn" onclick="openTaskMenu('${tab}',${i})" style="font-size:18px;padding:2px 6px;color:var(--text3)">⋯</button>
    </div>
  </div>`;
}

function openTaskMenu(tab,i){
  const arr=getTaskArr(tab);if(!arr)return;
  const t=arr[i];
  const currentMonthKey=tab.startsWith('monthly_')?tab.replace('monthly_',''):null;
  const mainDests=[
    {key:'today',label:'☀️ Today'},
    {key:'yearly',label:'🎯 Yearly Goals'},
    {key:'backlog',label:'🗒️ Later (Backlog)'},
  ].filter(d=>d.key!==tab&&!(tab==='yearly'&&d.key==='yearly'));
  const monthDests=MONTHS.filter(m=>!currentMonthKey||m!==currentMonthKey).map(m=>({key:'monthly_'+m,label:m}));

  openModal(`<div class="modal-handle"></div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:14px;font-style:italic">"${h(t.text.slice(0,60))}${t.text.length>60?'...':''}"</div>
    <button class="modal-btn primary" onclick="closeModal();editTask('${tab}',${i})">✏️ Edit</button>
    ${t.tracker?`<button class="modal-btn secondary" onclick="closeModal();removeTaskTracker('${tab}',${i})">✕ Remove tracker</button>`:`<button class="modal-btn secondary" onclick="closeModal();openAddTaskTracker('${tab}',${i})">📊 Add tracker</button>`}
    <button class="modal-btn danger" onclick="deleteTask('${tab}',${i});closeModal()">🗑 Delete</button>
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin:14px 0 10px;font-weight:600">Move to</div>
    ${mainDests.map(d=>`<button class="modal-btn secondary" onclick="moveTaskTo('${tab}',${i},'${d.key}')">${d.label}</button>`).join('')}
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:10px;margin-bottom:14px">
      ${monthDests.map(d=>`<button onclick="moveTaskTo('${tab}',${i},'${d.key}')" style="padding:10px 6px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text)">${d.label}</button>`).join('')}
    </div>
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>`);
}

function emptyHTML(msg){return`<div class="empty"><div class="empty-icon">✦</div><div class="empty-text">${msg}</div></div>`;}

// ============================================================
// TASKS
// ============================================================
function getTab(){
  if(S.currentTab==='yearly'){const sub=S.currentYearlySub;if(sub==='Goals')return'yearly';return'yearly_'+sub;}
  if(S.currentTab==='monthly'){const m=S.currentMonth||MONTHS[new Date().getMonth()];return'monthly_'+m;}
  if(S.currentTab==='projects')return null;
  return S.currentTab;
}

function addTask(){
  const inp=document.getElementById('addInput');
  const text=inp.value.trim();if(!text)return;
  const tab=getTab();if(!tab)return;
  if(tab.startsWith('monthly_')){
    const m=tab.replace('monthly_','');
    if(!S.monthlyTasks)S.monthlyTasks={};
    if(!S.monthlyTasks[m])S.monthlyTasks[m]=[];
    S.monthlyTasks[m].push({text,done:false,created:Date.now()});
  } else {
    if(!S.tasks[tab])S.tasks[tab]=[];
    S.tasks[tab].push({text,done:false,created:Date.now()});
  }
  inp.value='';save();render();
}

function toggleTask(tab,i){
  let arr=getTaskArr(tab);if(!arr)return;
  const t=arr[i];t.done=!t.done;
  if(t.done){S.history.unshift({text:t.text,tab,date:new Date().toLocaleDateString(),ts:Date.now()});if(S.history.length>300)S.history.pop();}
  save();render();
}

function deleteTask(tab,i){
  const arr=getTaskArr(tab);if(!arr)return;
  arr.splice(i,1);save();render();

// DRAG & DROP
// ============================================================
function initDrag(tab){
  initDragGeneric(tab,(fi,ti)=>{const arr=S.tasks[tab];const[m]=arr.splice(fi,1);arr.splice(ti,0,m);save();render();});
}
function initDragGeneric(key,cb){
  const items=document.querySelectorAll('.task-item');
  let src=null;
  items.forEach(item=>{
    item.addEventListener('dragstart',()=>{src=item;item.classList.add('dragging');});
    item.addEventListener('dragend',()=>item.classList.remove('dragging'));
    item.addEventListener('dragover',e=>{e.preventDefault();item.classList.add('drag-over');});
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{
      e.preventDefault();item.classList.remove('drag-over');
      if(!src||src===item)return;
      const fi=parseInt(src.dataset.index),ti=parseInt(item.dataset.index);
      cb(fi,ti);
    });
  });
}

// Universal drag-to-reorder for any list of elements with data-idx attribute
function initDragAny(containerSelector, arr, onReorder){
  const container=document.querySelector(containerSelector);
  if(!container)return;
  const items=[...container.querySelectorAll('[data-idx]')];
  let src=null;
  items.forEach(item=>{
    item.setAttribute('draggable','true');
    item.addEventListener('dragstart',e=>{src=item;item.style.opacity='.4';e.dataTransfer.effectAllowed='move';});
    item.addEventListener('dragend',()=>{item.style.opacity='';src=null;});
    item.addEventListener('dragover',e=>{e.preventDefault();item.style.outline='2px solid var(--accent2)';});
    item.addEventListener('dragleave',()=>item.style.outline='');
    item.addEventListener('drop',e=>{
      e.preventDefault();item.style.outline='';
      if(!src||src===item)return;
      const fi=parseInt(src.dataset.idx),ti=parseInt(item.dataset.idx);
      if(isNaN(fi)||isNaN(ti))return;
      const[moved]=arr.splice(fi,1);arr.splice(ti,0,moved);
      onReorder();
    });
  });
}

function openTabOrder(){

    return S.tabOrder.map((tab,i)=>{

          <button onclick="moveTabDown(${i})" ${isLast?'disabled':''} style="background:none;border:1px solid var(--border);border-radius:6px;width:28px;height:26px;cursor:${isLast?'default':'pointer'};opacity:${isLast?'.25':'1'};font-size:13px;color:var(--text2)">↓</button>

function moveTabUp(i){
  if(i===0)return;
  [S.tabOrder[i-1],S.tabOrder[i]]=[S.tabOrder[i],S.tabOrder[i-1]];
  save();openTabOrder();renderNav();
}
function moveTabDown(i){
  if(i===S.tabOrder.length-1)return;
  [S.tabOrder[i],S.tabOrder[i+1]]=[S.tabOrder[i+1],S.tabOrder[i]];
  save();openTabOrder();renderNav();
}

function scheduleNotif(time,message){
  if(!('Notification'in window)||Notification.permission!=='granted'||!time)return;
  const[hh,mm]=time.split(':').map(Number);
  const now=new Date(),target=new Date(now);target.setHours(hh,mm,0,0);if(target<=now)target.setDate(target.getDate()+1);
  setTimeout(()=>{new Notification('Octopus',{body:message});setInterval(()=>new Notification('Octopus',{body:message}),86400000);},target-now);
}

  if(!S.userName){showOnboarding();return;}
  const hr=new Date().getHours();const day=td();

  if(!S.lastMorningFlow)startMorningFlow();

function startMorningFlow(){showMS(0);}

function showMS(step){
  const flow=document.getElementById('flowScreen');flow.style.display='flex';
  const steps={
    0:()=>`<div class="flow-inner">
      <div class="flow-icon">🌅</div>
      <div class="flow-title">${getMorningSubtitle()}</div>
      <div class="flow-subtitle">Let's set you up to win.</div>

    </div>`,
    1:()=>{
      const bl=S.tasks.backlog||[];
      return`<div class="flow-inner">
        <div class="flow-icon">🗒️</div><div class="flow-title">Backlog Review</div>
        <div class="flow-subtitle">Move anything to today?</div>
        ${bl.length?`<div style="width:100%;max-height:200px;overflow-y:auto;margin-bottom:14px">${bl.map((t,i)=>`
          <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:10px">
            <div style="flex:1;font-size:14px">${h(t.text)}</div>
            <button onclick="bl2today(${i})" style="background:var(--accent2);color:white;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit">+ Today</button>
          </div>`).join('')}</div>`:`<div style="font-size:14px;color:var(--text3);margin-bottom:18px">Backlog is clear ✓</div>`}
        <button class="flow-btn primary" onclick="showMS(2)">Done →</button>
        <button class="flow-btn secondary" onclick="endMorningFlow()">Skip</button>
      </div>`;
    },
    2:()=>reviewStep('📅','Weekly Goals',S.tasks.weekly||[],3),
    3:()=>{
      const mon=MONTHS[new Date().getMonth()];
      const mtasks=(S.monthlyTasks&&S.monthlyTasks[mon])||[];
      return reviewStep('🗓️',`${mon} Goals`,mtasks,4);
    },
    4:()=>{
      const moodList=(S.moodShifters||[]).slice(0,4).map(m=>m.text||m).join(' · ')||'None yet';
      S.happinessPlan=S.lastHPDate===td()?S.happinessPlan:[];
      return`<div class="flow-inner">
        <div class="flow-icon">🌟</div><div class="flow-title">Plan to stay happy?</div>
        <div style="width:100%;margin-bottom:10px">
          <div style="font-size:12px;color:var(--text3);margin-bottom:8px;text-align:left">Mood shifters: ${h(moodList)}</div>
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <input id="hpfi" class="flow-input" style="min-height:42px;resize:none;flex:1;margin-bottom:0" placeholder="e.g. go for a walk...">
            <button onclick="addFlowHP()" style="background:var(--accent2);color:white;border:none;border-radius:10px;padding:10px 13px;cursor:pointer;font-size:17px;flex-shrink:0">+</button>
          </div>
          <div id="hpfl" style="max-height:120px;overflow-y:auto">
            ${(S.happinessPlan||[]).map((p,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)"><div style="flex:1;font-size:14px">• ${h(p.text)}</div><button onclick="rmFlowHP(${i})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px">✕</button></div>`).join('')}
          </div>
        </div>
        <button class="flow-btn primary" onclick="finalHP()">Set My Plan →</button>
        <button class="flow-btn secondary" onclick="showMS(5)">Skip</button>
      </div>`;
    },
    5:()=>{
      if(!S.affirmations.length)return showMS(6)||'';
      return`<div class="flow-inner">
        <div class="flow-icon">⭐</div><div class="flow-title">Affirmation of the Day</div>
        <div class="flow-subtitle">Choose one to carry with you.</div>
        <div style="width:100%;max-height:50vh;overflow-y:auto;margin-bottom:14px">
          ${S.affirmations.map((a,i)=>`

        </div>
        <button class="flow-btn secondary" onclick="showMS(6)">Skip</button>

    6:()=>{
      // "Which ONE task would make you feel most accomplished today?"
      const todayTasks=S.tasks.today||[];
      return`<div class="flow-inner">
        <div class="flow-icon">🌟</div>
        <div class="flow-title">The One Thing</div>
        <div class="flow-subtitle">Which task would make you feel most accomplished if you got it done today?</div>
        ${todayTasks.length?`<div style="width:100%;max-height:220px;overflow-y:auto;margin-bottom:14px">
          ${todayTasks.map((t,i)=>`
            <div onclick="setStarFromFlow(${i})" style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;${t.starred?'border-color:var(--star);background:rgba(240,180,41,.08)':''}" onmouseover="this.style.borderColor='var(--star)'" onmouseout="this.style.borderColor='${t.starred?'var(--star)':'var(--border)'}'">
              <div style="font-size:14px;line-height:1.4">${t.starred?'⭐ ':''} ${h(t.text)}</div>
            </div>`).join('')}
        </div>`:`<div style="font-size:14px;color:var(--text3);margin-bottom:18px">Add tasks first, then come back!</div>`}
        <button class="flow-btn primary" onclick="showMS(7)">Done →</button>
        <button class="flow-btn secondary" onclick="showMS(7)">Skip</button>
      </div>`;
    },
    7:()=>`<div class="flow-inner">
      <div class="flow-icon">🔔</div><div class="flow-title">Set Today's Notifications</div>
      <div style="width:100%;display:flex;gap:8px;flex-direction:column;margin-bottom:14px">
        <input id="fnt" type="time" class="flow-input" style="min-height:42px;resize:none">
        <textarea id="fnm" class="flow-input" rows="2" placeholder="Your exact message..."></textarea>
        <button onclick="addFlowNotif()" style="background:var(--accent2);color:white;border:none;border-radius:10px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">+ Add Notification</button>
        <div id="fnl">${(S.notifications||[]).slice(-3).map(n=>`<div style="font-size:12px;color:var(--text3);padding:3px 0">${n.time} — ${h(n.message)}</div>`).join('')}</div>
      </div>
      <button class="flow-btn primary" onclick="endMorningFlow()">Let's win today 🚀</button>
    </div>`
  };
  const fn=steps[step];if(fn){const r=fn();if(r)flow.innerHTML=r;}
}

function reviewStep(icon,title,tasks,next){
  return`<div class="flow-inner">
    <div class="flow-icon">${icon}</div><div class="flow-title">${title}</div>
    <div class="flow-subtitle">Keep these top of mind.</div>
    ${tasks.length?`<div style="width:100%;max-height:180px;overflow-y:auto;margin-bottom:14px">${tasks.map(t=>`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:7px;font-size:14px;text-align:left;${t.done?'text-decoration:line-through;color:var(--done)':''}">${h(t.text)}</div>`).join('')}</div>`:`<div style="font-size:14px;color:var(--text3);margin-bottom:18px">Nothing set yet.</div>`}
    <button class="flow-btn primary" onclick="showMS(${next})">Done →</button>
    <button class="flow-btn secondary" onclick="endMorningFlow()">Skip</button>
  </div>`;
}

function bl2today(i){const t=(S.tasks.backlog||[]).splice(i,1)[0];t.done=false;if(!S.tasks.today)S.tasks.today=[];S.tasks.today.push(t);save();showMS(1);}
function addFlowHP(){
  const inp=document.getElementById('hpfi');const v=inp.value.trim();if(!v)return;
  if(!S.happinessPlan)S.happinessPlan=[];
  S.happinessPlan.push({text:v,isTask:false,done:false});S.lastHPDate=td();inp.value='';save();
  const el=document.getElementById('hpfl');if(el)el.innerHTML=(S.happinessPlan||[]).map((p,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)"><div style="flex:1;font-size:14px">• ${h(p.text)}</div><button onclick="rmFlowHP(${i})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px">✕</button></div>`).join('');
}
function rmFlowHP(i){
  S.happinessPlan.splice(i,1);save();
  const el=document.getElementById('hpfl');if(el)el.innerHTML=(S.happinessPlan||[]).map((p,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)"><div style="flex:1;font-size:14px">• ${h(p.text)}</div><button onclick="rmFlowHP(${i})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px">✕</button></div>`).join('');
}
function finalHP(){S.lastHPDate=td();save();showMS(5);}
function setAODFlow(i){S.affirmationOfDay={text:S.affirmations[i].text||S.affirmations[i],date:td()};save();showMS(6);}
function setStarFromFlow(i){
  const tasks=S.tasks.today||[];
  if(tasks[i])tasks[i].starred=true;
  save();showMS(7);
}
function addFlowNotif(){
  const time=document.getElementById('fnt').value;const msg=document.getElementById('fnm').value.trim();if(!msg)return;
  S.notifications.push({time,message:msg,created:Date.now()});save();scheduleNotif(time,msg);
  document.getElementById('fnm').value='';
  const el=document.getElementById('fnl');if(el)el.innerHTML+=`<div style="font-size:12px;color:var(--text3);padding:3px 0">${time} — ${h(msg)}</div>`;
}
function endMorningFlow(){S.lastMorningFlow=td();save();endFlow();render();}

// ============================================================
// AFF REMINDERS
// ============================================================
function scheduleAffReminders(){
  if(!('Notification'in window)||Notification.permission!=='granted')return;
  [9,12,15,18].forEach(hh=>{
    const now=new Date(),t=new Date(now);t.setHours(hh,0,0,0);if(t<=now)t.setDate(t.getDate()+1);
    setTimeout(()=>{new Notification('Octopus',{body:'✨ Read your affirmations!'});setInterval(()=>new Notification('Octopus',{body:'✨ Read your affirmations!'}),86400000);},t-now);
  });
}

// ============================================================
// INIT
// ============================================================
load();
applyTheme(S.theme||'light');
if(S.currentTab==='weekly')S.currentTab='today';
if(!S.tabOrder||S.tabOrder.length!==ALL_TABS.length)S.tabOrder=[...ALL_TABS];
if(NO_ADD_BAR.includes(S.currentTab))document.getElementById('addBar').style.display='none';
if('Notification'in window){
  if(Notification.permission==='default'){
    Notification.requestPermission().then(p=>{if(p==='granted'){scheduleAffReminders();(S.notifications||[]).forEach(n=>scheduleNotif(n.time,n.message));}});
  } else if(Notification.permission==='granted'){
    scheduleAffReminders();(S.notifications||[]).forEach(n=>scheduleNotif(n.time,n.message));
  }
}
render();
setTimeout(checkFlows,900);

// ============================================================
// OFFLINE CACHE
// ============================================================
(async function(){
  if(!('caches'in window))return;
  try{
    const CACHE='octopus-v3';
    const cache=await caches.open(CACHE);
    const url=location.href.split('?')[0];
    const existing=await cache.match(url);
    if(!existing){const resp=await fetch(url);if(resp&&resp.status===200)await cache.put(url,resp.clone());}
    window.addEventListener('online',async()=>{const resp=await fetch(url).catch(()=>null);if(resp&&resp.status===200)await cache.put(url,resp.clone());});
  }catch(e){}
})();

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  if(!window.matchMedia('(display-mode: standalone)').matches){
    const banner=document.createElement('div');
    banner.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--accent2);color:white;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.25);white-space:nowrap';
    banner.textContent='📲 Install Octopus — tap here';
    banner.onclick=()=>{deferredPrompt.prompt();banner.remove();};
    document.body.appendChild(banner);
    setTimeout(()=>{if(banner.parentNode)banner.remove();},10000);
  }
});
</script>
