<style>
  /* Embedded high-quality font stack — no internet needed */
  @font-face {
    font-family: 'DisplayFont';
    src: local('Georgia'), local('Times New Roman'), local('serif');
    font-weight: 400 700;
  }
</style>
<style>
:root{--bg:#f9f8f6;--bg2:#ffffff;--bg3:#f0ede8;--text:#1a1a1a;--text2:#555;--text3:#999;--accent:#1a1a1a;--accent2:#c8a96e;--border:#e8e4de;--done:#b0a898;--tab-active:#1a1a1a;--tab-inactive:#bbb;--shadow:0 2px 24px rgba(0,0,0,.08);--radius:16px;--danger:#c0392b;--font-body:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;--font-display:Georgia,'Times New Roman',serif;}
.dark{--bg:#000;--bg2:#111;--bg3:#1c1c1c;--text:#f5f5f0;--text2:#aaa;--text3:#555;--accent:#f5f5f0;--accent2:#c8a96e;--border:#2a2a2a;--done:#444;--tab-active:#f5f5f0;--tab-inactive:#444;--shadow:0 2px 24px rgba(0,0,0,.5);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}

/* TOP HEADER — greeting + icons only */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:18px 20px 16px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between}
.app-title{font-family:var(--font-display);font-size:26px;font-weight:700;letter-spacing:-.5px;color:var(--text);line-height:1.1}
.header-icons{display:flex;gap:8px;align-items:center}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;padding:6px;border-radius:10px;transition:color .2s;display:flex;align-items:center}
.icon-btn:hover{color:var(--text)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:24px 18px 160px;scrollbar-width:none}
.content::-webkit-scrollbar{display:none}

/* SECTION LABEL */
.section-label{font-size:12px;text-transform:uppercase;letter-spacing:1.8px;color:var(--text3);margin-bottom:14px;margin-top:24px;font-weight:600}
.section-label:first-child{margin-top:0}

/* TASK ITEMS — bigger, chunkier */
.task-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;cursor:grab;transition:box-shadow .2s,opacity .2s}
.task-item.dragging{opacity:.4}
.task-item.drag-over{border-color:var(--accent2)}
.task-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}
.task-check.done{background:var(--accent2);border-color:var(--accent2)}
.task-check.done::after{content:'✓';color:white;font-size:13px;font-weight:700}
.task-text{flex:1;font-size:17px;line-height:1.5;color:var(--text);word-break:break-word}
.task-text.done{text-decoration:line-through;color:var(--done)}
.task-meta{font-size:13px;color:var(--text3);margin-top:4px}
.task-action-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:4px 6px;border-radius:6px;transition:color .2s}
.task-action-btn:hover{color:var(--text)}
.drag-handle{color:var(--text3);font-size:16px;cursor:grab;flex-shrink:0;margin-top:3px}
.cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:6px}

/* ADD BAR — sits above bottom nav */
.add-bar{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;align-items:center;z-index:200}
.add-input{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:14px;padding:13px 16px;font-size:16px;color:var(--text);font-family:var(--font-body);outline:none;transition:border-color .2s}
.add-input:focus{border-color:var(--accent2)}
.add-input::placeholder{color:var(--text3)}
.add-btn{background:var(--accent);color:var(--bg2);border:none;border-radius:14px;padding:13px 20px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font-body)}

/* BOTTOM NAV BAR */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:300;height:72px;padding:0 4px}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:none;cursor:pointer;padding:8px 4px;transition:all .15s;border-radius:0;font-family:var(--font-body)}
.nav-icon{font-size:22px;line-height:1;transition:transform .15s}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--tab-inactive);transition:color .15s}
.nav-btn.active .nav-label{color:var(--accent2)}
.nav-btn.active .nav-icon{transform:scale(1.15)}
.nav-btn:active .nav-icon{transform:scale(.9)}

/* CATEGORY CHIPS */
.category-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.chip{padding:7px 14px;border-radius:22px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);color:var(--text2);background:var(--bg2);transition:all .15s;display:flex;align-items:center;gap:5px}
.chip.active{background:var(--accent);color:var(--bg2);border-color:var(--accent)}
.chip-x{font-size:11px;opacity:.5}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:24px 24px 0 0;padding:28px 22px 44px;width:100%;max-width:480px;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:44px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 22px}
.modal-title{font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:20px}
.modal-input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;font-size:16px;color:var(--text);font-family:var(--font-body);outline:none;transition:border-color .2s;margin-bottom:12px;resize:vertical;min-height:48px}
.modal-input:focus{border-color:var(--accent2)}
.modal-btn{width:100%;padding:16px;border-radius:14px;border:none;font-size:17px;font-weight:600;cursor:pointer;font-family:var(--font-body);margin-bottom:10px;transition:opacity .2s}
.modal-btn.primary{background:var(--accent);color:var(--bg2)}
.modal-btn.secondary{background:var(--bg3);color:var(--text)}
.modal-btn.danger{background:var(--danger);color:white}
.modal-btn:hover{opacity:.85}

/* PROGRESS */
.progress-bar{background:var(--bg3);border-radius:6px;height:6px;margin-bottom:18px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent2);border-radius:6px;transition:width .4s ease}

/* SUB TABS */
.sub-tabs{display:flex;margin-bottom:18px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{padding:10px 16px;font-size:13px;font-weight:600;color:var(--text3);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2.5px solid transparent;transition:all .2s;font-family:var(--font-body)}
.sub-tab.active{color:var(--accent2);border-bottom-color:var(--accent2)}

/* MISC */
.history-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.history-task{font-size:15px;color:var(--done);text-decoration:line-through}
.history-date{font-size:12px;color:var(--text3);margin-top:4px}
.notif-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.notif-time{font-size:14px;font-weight:700;color:var(--accent2);min-width:55px}
.notif-msg{font-size:15px;color:var(--text);flex:1}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:16px}

/* FLOW SCREEN */
.flow-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;overflow-y:auto}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.flow-inner{animation:fi .35s ease;display:flex;flex-direction:column;align-items:center;width:100%;max-width:400px}
.flow-icon{font-size:54px;margin-bottom:20px}
.flow-title{font-family:var(--font-display);font-size:27px;font-weight:700;margin-bottom:12px;line-height:1.3}
.flow-subtitle{font-size:16px;color:var(--text2);margin-bottom:28px;line-height:1.6}
.flow-btn{width:100%;max-width:340px;padding:17px;border-radius:16px;border:none;font-size:17px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:opacity .2s;margin-bottom:12px}
.flow-btn.primary{background:var(--accent);color:var(--bg2)}
.flow-btn.secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.flow-input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;font-size:16px;color:var(--text);font-family:var(--font-body);outline:none;resize:none;margin-bottom:14px}
.flow-input:focus{border-color:var(--accent2)}
.flashcard{width:100%;max-width:340px;min-height:200px;background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:32px 24px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:21px;line-height:1.5;font-family:var(--font-display);box-shadow:var(--shadow);margin-bottom:24px;cursor:pointer;transition:transform .15s}
.flashcard:active{transform:scale(.98)}

/* HAPPINESS PLAN */
.hp-card{background:linear-gradient(135deg,rgba(200,169,110,.13),rgba(200,169,110,.03));border:1px solid rgba(200,169,110,.35);border-radius:var(--radius);padding:18px;margin-bottom:20px}
.hp-title{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent2);font-weight:700;margin-bottom:12px}
.bullet-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.bullet-item:last-child{border-bottom:none}
.bullet-dot{font-size:16px;flex-shrink:0}
.bullet-text{flex:1;font-size:15px;line-height:1.5;color:var(--text)}
.bullet-text.done{text-decoration:line-through;color:var(--done)}
.bullet-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px}

/* AOD */
.aod-card{background:linear-gradient(135deg,rgba(200,169,110,.15),rgba(200,169,110,.04));border:1px solid rgba(200,169,110,.4);border-radius:18px;padding:20px;margin-bottom:18px;text-align:center}
.aod-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--accent2);font-weight:700;margin-bottom:10px}
.aod-text{font-family:var(--font-display);font-size:17px;line-height:1.6;color:var(--text);font-style:italic}

/* GRATITUDE */
.gratitude-entry{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.gratitude-date{font-size:12px;color:var(--accent2);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.gratitude-text{font-size:15px;line-height:1.6;color:var(--text)}

</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <span class="app-title" id="appTitle">Octopus</span>
      <div class="header-icons">
        <button class="icon-btn" onclick="openProfile()" title="Profile">👤</button>
        <button class="icon-btn" onclick="openAffirmations()" title="Affirmations">✨</button>
        <button class="icon-btn" onclick="openMoodAndWins()" title="Mood & Wins">🎈</button>
        <button class="icon-btn" onclick="openGratitudeHistory()" title="Gratitude">🙏</button>
        <button class="icon-btn" onclick="openHistory()" title="History">📋</button>
        <button class="icon-btn" onclick="toggleDark()" id="darkBtn">🌙</button>
        <button class="icon-btn" onclick="openNotifManager()" title="Notifications">🔔</button>
      </div>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
  <div class="add-bar">
    <input class="add-input" id="addInput" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTask()">
    <button class="add-btn" onclick="addTask()">Add</button>
  </div>
  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-btn active" id="nav-today" onclick="switchTab('today')">
      <span class="nav-icon">☀️</span>
      <span class="nav-label">Today</span>
    </button>
    <button class="nav-btn" id="nav-weekly" onclick="switchTab('weekly')">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Weekly</span>
    </button>
    <button class="nav-btn" id="nav-monthly" onclick="switchTab('monthly')">
      <span class="nav-icon">🗓️</span>
      <span class="nav-label">Monthly</span>
    </button>
    <button class="nav-btn" id="nav-yearly" onclick="switchTab('yearly')">
      <span class="nav-icon">🎯</span>
      <span class="nav-label">Yearly</span>
    </button>
    <button class="nav-btn" id="nav-backlog" onclick="switchTab('backlog')">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Backlog</span>
    </button>

  </nav>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<div class="flow-screen" id="flowScreen" style="display:none"></div>

      <div class="ai-header-sub">Powered by Claude — can add, edit & manage your tasks</div>
    </div>
    <button class="ai-close" onclick="closeAIChat()">✕</button>
  </div>
  <div class="ai-messages" id="aiMessages"></div>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let S={
  tasks:{today:[],weekly:[],monthly:[],yearly:[],backlog:[]},
  categories:['Personal','Work','Health','Family'],
  yearlySubTabs:['Goals'],
  affirmations:[],        // [{text,category}]
  affCategories:['General'],
  affirmationOfDay:null,  // {text,date}
  notifications:[],
  history:[],
  darkMode:false,
  currentTab:'today',
  currentYearlySub:'Goals',
  currentCategory:'All',
  lastMorningFlow:null,
  lastEveningFlow:null,
  gratitude:[],           // [{date,text,ts}]
  moodShifters:[],        // [{text}]
  wins:[],                // [{text}]
  happinessPlan:[],       // [{text,isTask,done}]
  lastHPDate:null,
  yearlyMeta:{},          // {subTabName: {total, done, unit}}
  userName:'',
  
};

const CCOLORS={Personal:'#c8a96e',Work:'#5b8dee',Health:'#27ae60',Family:'#e74c3c'};
const cc=c=>CCOLORS[c]||'#9b59b6';
const td=()=>new Date().toDateString();
const h=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function save(){try{localStorage.setItem('mpl3',JSON.stringify(S))}catch(e){}}
function load(){try{const s=localStorage.getItem('mpl3');if(s)S={...S,...JSON.parse(s)}}catch(e){}}

// ============================================================
// TABS
// ============================================================
function switchTab(tab){
  S.currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('nav-'+tab);
  if(btn)btn.classList.add('active');
  render();
}

// ============================================================
// RENDER
// ============================================================
function render(){
  const c=document.getElementById('mainContent');
  // Update greeting in header
  const titleEl=document.getElementById('appTitle');
  if(titleEl&&S.userName) titleEl.textContent=getGreeting();
  if(S.currentTab==='today')renderToday(c);
  else if(S.currentTab==='weekly')renderList(c,'weekly','This Week');
  else if(S.currentTab==='monthly')renderList(c,'monthly','This Month');
  else if(S.currentTab==='yearly')renderYearly(c);
  else if(S.currentTab==='backlog')renderList(c,'backlog','Backlog');
}

function renderToday(c){
  const cats=['All',...S.categories];
  const act=S.currentCategory;
  const tasks=S.tasks.today;
  const filt=act==='All'?tasks:tasks.filter(t=>t.category===act);
  const done=filt.filter(t=>t.done).length;
  const pct=filt.length?Math.round(done/filt.length*100):0;

  // AOD — always show, tappable to pick/change
  const aodSet = S.affirmationOfDay && S.affirmationOfDay.date===td();
  let aodHTML='';
  if(aodSet){
    aodHTML=`<div class="aod-card" onclick="openPickAOD()" title="Tap to change">
      <div class="aod-label">✨ Affirmation of the Day <span style="font-size:10px;opacity:.5">tap to change</span></div>
      <div class="aod-text">${h(S.affirmationOfDay.text)}</div>
    </div>`;
  } else if(S.affirmations.length){
    aodHTML=`<div class="aod-card" onclick="openPickAOD()" style="cursor:pointer;opacity:.75;border-style:dashed">
      <div class="aod-label">✨ Affirmation of the Day</div>
      <div class="aod-text" style="font-size:14px;color:var(--text3)">Tap to choose today's affirmation →</div>
    </div>`;
  }

  let hpHTML='';
  const plan=S.happinessPlan||[];
  if(S.lastHPDate===td()&&plan.length){
    hpHTML=`<div class="hp-card">
      <div class="hp-title">🌟 Today's Happiness Plan</div>
      ${plan.map((p,i)=>`<div class="bullet-item">
        <div class="bullet-dot">${p.isTask?'☐':'•'}</div>
        <div class="bullet-text ${p.done?'done':''}">${h(p.text)}</div>
        ${p.isTask?`<div class="task-check ${p.done?'done':''}" style="width:18px;height:18px;margin-top:0;flex-shrink:0" onclick="toggleHP(${i})"></div>`:''}
        <button class="bullet-del" onclick="removeHP(${i})">✕</button>
      </div>`).join('')}
      <button onclick="addHPItem()" style="margin-top:10px;background:none;border:1px dashed var(--accent2);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--accent2);cursor:pointer;width:100%;font-family:inherit">+ Add to plan</button>
    </div>`;
  }

  c.innerHTML=`
    <div class="category-chips">
      ${cats.map(cat=>`<div class="chip ${act===cat?'active':''}" onclick="filterCat('${cat}')">
        ${cat}${cat!=='All'?`<span class="chip-x" onclick="event.stopPropagation();delCat('${cat}')">✕</span>`:''}
      </div>`).join('')}
      <div class="chip" onclick="addCat()">+ New</div>
      <div class="chip" onclick="manageCats()">✏️</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    ${aodHTML}${hpHTML}
    <div class="section-label">${done}/${filt.length} tasks done</div>
    <div id="taskList">${filt.length?filt.map((t,i)=>taskHTML(t,i,'today')).join(''):emptyHTML("You're ahead. Add something.")}</div>`;
  initDrag('today');
}

function renderList(c,tab,label){
  const tasks=S.tasks[tab];
  const done=tasks.filter(t=>t.done).length;
  c.innerHTML=`<div class="section-label">${label} — ${done}/${tasks.length} done</div>
    <div id="taskList">${tasks.length?tasks.map((t,i)=>taskHTML(t,i,tab)).join(''):emptyHTML('Nothing here yet.')}</div>`;
  initDrag(tab);
}

function renderYearly(c){
  const subs=S.yearlySubTabs;
  const active=S.currentYearlySub;
  let inner='';

  if(active==='Goals'){
    inner=`<div id="taskList">${S.tasks.yearly.length?S.tasks.yearly.map((t,i)=>taskHTML(t,i,'yearly')).join(''):emptyHTML('Set your big goals for the year.')}</div>`;
  } else {
    // Custom yearly sub-tab — with editable items + optional tracker
    const key='yearly_'+active;
    if(!S.tasks[key])S.tasks[key]=[];
    const meta=S.yearlyMeta?.[active]||{};
    const items=S.tasks[key];

    // Tracker header (if configured)
    let trackerHTML='';
    if(meta.total){
      const done=meta.done||0;
      const pct=Math.round(done/meta.total*100);
      const unit=meta.unit||'items';
      trackerHTML=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="font-size:13px;font-weight:600;color:var(--text)">${done} / ${meta.total} ${h(unit)}</div>
          <div style="font-size:12px;color:var(--accent2);font-weight:600">${pct}%</div>
        </div>
        <div class="progress-bar" style="margin-bottom:10px"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="display:flex;gap:8px">
          <button onclick="trackerAdjust('${active}',-1)" style="flex:1;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:18px;cursor:pointer">−</button>
          <button onclick="trackerAdjust('${active}',1)" style="flex:1;padding:8px;background:var(--accent2);border:none;border-radius:8px;font-size:18px;cursor:pointer;color:white">+</button>
          <button onclick="editTracker('${active}')" style="padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;color:var(--text2)">Edit</button>
        </div>
      </div>`;
    } else {
      trackerHTML=`<button onclick="addTracker('${active}')" style="width:100%;margin-bottom:14px;padding:10px;background:none;border:1px dashed var(--border);border-radius:10px;font-size:13px;color:var(--text3);cursor:pointer;font-family:inherit">+ Add progress tracker (optional)</button>`;
    }

    inner=`${trackerHTML}
      <div id="taskList">${items.length?items.map((t,i)=>yearlyItemHTML(t,i,key)).join(''):emptyHTML('Add items to this section.')}</div>`;
  }

  const tabsHTML=`<div class="sub-tabs">
    ${subs.map(s=>`<button class="sub-tab ${active===s?'active':''}" onclick="switchYearlySub('${s}')">${h(s)}</button>`).join('')}
    <button class="sub-tab" onclick="addYearlySubTab()">+</button>
    ${active!=='Goals'?`<button class="sub-tab" onclick="manageYearlySub('${active}')">✏️</button>`:''}
  </div>`;

  c.innerHTML=tabsHTML+inner;
  if(active==='Goals')initDrag('yearly');
  else initDragYearly('yearly_'+active);
}

// Yearly item HTML — like taskHTML but with edit button
function yearlyItemHTML(t,i,key){
  return`<div class="task-item" draggable="true" data-index="${i}" data-tab="${key}">
    <div class="drag-handle">⠿</div>
    <div class="task-check ${t.done?'done':''}" onclick="toggleTask('${key}',${i})"></div>
    <div style="flex:1">
      <div class="task-text ${t.done?'done':''}">${h(t.text)}</div>
      ${t.note?`<div class="task-meta">${h(t.note)}</div>`:''}
    </div>
    <div style="display:flex;gap:4px">
      <button class="task-action-btn" onclick="editYearlyItem('${key}',${i})">✏️</button>
      <button class="task-action-btn" onclick="deleteTask('${key}',${i})">✕</button>
    </div>
  </div>`;
}

function editYearlyItem(key,i){
  const t=S.tasks[key][i];
  openModal(`<div class="modal-handle"></div><div class="modal-title">Edit Item</div>
    <input class="modal-input" id="eyiText" value="${h(t.text)}" style="width:100%">
    <input class="modal-input" id="eyiNote" value="${h(t.note||'')}" placeholder="Note (optional)..." style="width:100%">
    <button class="modal-btn primary" onclick="saveYearlyItem('${key}',${i})">Save</button>
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>`);
}
function saveYearlyItem(key,i){
  S.tasks[key][i].text=document.getElementById('eyiText').value.trim()||S.tasks[key][i].text;
  S.tasks[key][i].note=document.getElementById('eyiNote').value.trim();
  save();closeModal();render();
}

// Tracker functions
function addTracker(sub){
  openModal(`<div class="modal-handle"></div><div class="modal-title">Add Progress Tracker</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:14px">Track how many you've done out of a total.</div>
    <input class="modal-input" id="trTotal" type="number" placeholder="Total (e.g. 20)" min="1" style="width:100%">
    <input class="modal-input" id="trUnit" placeholder="Unit name (e.g. chapters, pages, sessions...)" style="width:100%">
    <input class="modal-input" id="trDone" type="number" placeholder="Already done (default 0)" min="0" style="width:100%">
    <button class="modal-btn primary" onclick="saveTracker('${sub}')">Add Tracker</button>
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>`);
}
function editTracker(sub){
  const meta=S.yearlyMeta?.[sub]||{};
  openModal(`<div class="modal-handle"></div><div class="modal-title">Edit Tracker</div>
    <input class="modal-input" id="trTotal" type="number" value="${meta.total||''}" placeholder="Total" min="1" style="width:100%">
    <input class="modal-input" id="trUnit" value="${h(meta.unit||'')}" placeholder="Unit name..." style="width:100%">
    <input class="modal-input" id="trDone" type="number" value="${meta.done||0}" placeholder="Done so far" min="0" style="width:100%">
    <button class="modal-btn primary" onclick="saveTracker('${sub}')">Save</button>
    <button class="modal-btn danger" onclick="removeTracker('${sub}')">Remove Tracker</button>
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>`);
}
function saveTracker(sub){
  const total=parseInt(document.getElementById('trTotal').value)||0;
  const unit=document.getElementById('trUnit').value.trim()||'items';
  const done=Math.min(parseInt(document.getElementById('trDone').value)||0,total);
  if(!total){closeModal();return;}
  if(!S.yearlyMeta)S.yearlyMeta={};
  S.yearlyMeta[sub]={total,unit,done};
  save();closeModal();render();
}
function removeTracker(sub){
  if(S.yearlyMeta)delete S.yearlyMeta[sub];
  save();closeModal();render();
}
function trackerAdjust(sub,delta){
  if(!S.yearlyMeta?.[sub])return;
  const m=S.yearlyMeta[sub];
  m.done=Math.max(0,Math.min(m.total,(m.done||0)+delta));
  save();render();
}

function manageYearlySub(sub){
  openModal(`<div class="modal-handle"></div><div class="modal-title">Edit Section</div>
    <input class="modal-input" id="mysName" value="${h(sub)}" placeholder="Section name..." style="width:100%">
    <button class="modal-btn primary" onclick="renameYearlySub('${sub}')">Rename</button>
    <button class="modal-btn danger" onclick="deleteYearlySub('${sub}')">Delete Section</button>
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>`);
}
function renameYearlySub(old){
  const nv=document.getElementById('mysName').value.trim();
  if(!nv||nv===old){closeModal();return;}
  const idx=S.yearlySubTabs.indexOf(old);
  if(idx>-1)S.yearlySubTabs[idx]=nv;
  S.tasks['yearly_'+nv]=S.tasks['yearly_'+old]||[];
  delete S.tasks['yearly_'+old];
  if(S.yearlyMeta){S.yearlyMeta[nv]=S.yearlyMeta[old];delete S.yearlyMeta[old];}
  S.currentYearlySub=nv;
  save();closeModal();render();
}
function deleteYearlySub(sub){
  if(!confirm(`Delete "${sub}" and all its items?`))return;
  S.yearlySubTabs=S.yearlySubTabs.filter(s=>s!==sub);
  delete S.tasks['yearly_'+sub];
  if(S.yearlyMeta)delete S.yearlyMeta[sub];
  S.currentYearlySub=S.yearlySubTabs[0]||'Goals';
  save();closeModal();render();
}

function initDragYearly(key){
  const items=document.querySelectorAll('.task-item');
  let src=null;
  items.forEach(item=>{
    item.addEventListener('dragstart',()=>{src=item;item.classList.add('dragging');});
    item.addEventListener('dragend',()=>item.classList.remove('dragging'));
    item.addEventListener('dragover',e=>{e.preventDefault();item.classList.add('drag-over');});
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{
      e.preventDefault();item.classList.remove('drag-over');
      if(!src||src===item)return;
      const fi=parseInt(src.dataset.index),ti=parseInt(item.dataset.index);
      const arr=S.tasks[key];const[m]=arr.splice(fi,1);arr.splice(ti,0,m);
      save();render();
    });
  });
}

function taskHTML(t,i,tab){
  return`<div class="task-item" draggable="true" data-index="${i}" data-tab="${tab}">
    <div class="drag-handle">⠿</div>
    <div class="cat-dot" style="background:${cc(t.category)}"></div>
    <div class="task-check ${t.done?'done':''}" onclick="toggleTask('${tab}',${i})"></div>
    <div style="flex:1"><div class="task-text ${t.done?'done':''}">${h(t.text)}</div>${t.category?`<div class="task-meta">${t.category}</div>`:''}</div>
    <div style="display:flex;gap:4px">
      <button class="task-action-btn" onclick="moveToBacklog('${tab}',${i})" title="Backlog">📦</button>
      <button class="task-action-btn" onclick="deleteTask('${tab}',${i})">✕</button>
    </div>
  </div>`;
}

function emptyHTML(msg){return`<div class="empty"><div class="empty-icon">✦</div><div class="empty-text">${msg}</div></div>`;}

// ============================================================
// TASKS
// ============================================================
function getTab(){
  if(S.currentTab==='yearly'){
    const sub=S.currentYearlySub;
    if(sub==='Goals')return'yearly';
    return'yearly_'+sub;
  }
  return S.currentTab;
}

function addTask(){
  const inp=document.getElementById('addInput');
  const text=inp.value.trim();if(!text)return;
  const tab=getTab();if(!tab)return;
  if(!S.tasks[tab])S.tasks[tab]=[];
  const cat=S.currentCategory!=='All'?S.currentCategory:S.categories[0]||'Personal';
  S.tasks[tab].push({text,done:false,category:cat,created:Date.now()});
  inp.value='';save();render();
}

function toggleTask(tab,i){
  const t=S.tasks[tab][i];t.done=!t.done;
  if(t.done){S.history.unshift({text:t.text,tab,date:new Date().toLocaleDateString(),ts:Date.now()});if(S.history.length>300)S.history.pop();}
  save();render();
}
function deleteTask(tab,i){S.tasks[tab].splice(i,1);save();render();}
function moveToBacklog(tab,i){const t=S.tasks[tab].splice(i,1)[0];t.done=false;S.tasks.backlog.push(t);save();render();}
function filterCat(cat){S.currentCategory=cat;render();}


// ============================================================
// CATEGORIES
// ============================================================
function addCat(){
  openModal(`<div class="modal-handle"></div><div class="modal-title">New Category</div>
    <input class="modal-input" id="ci" placeholder="Name..." style="width:100%">
    <button class="modal-btn primary" onclick="saveCat()">Add</button>
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>`);
}
function saveCat(){const v=document.getElementById('ci').value.trim();if(v&&!S.categories.includes(v))S.categories.push(v);save();closeModal();render();}
function delCat(cat){S.categories=S.categories.filter(c=>c!==cat);if(S.currentCategory===cat)S.currentCategory='All';save();render();}
function manageCats(){
  openModal(`<div class="modal-handle"></div><div class="modal-title">✏️ Edit Categories</div>
    <div style="margin-bottom:14px">${S.categories.map((c,i)=>`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="width:10px;height:10px;border-radius:50%;background:${cc(c)};flex-shrink:0"></div>
        <div style="flex:1;font-size:15px">${h(c)}</div>
        <button class="task-action-btn" onclick="renameCat(${i})">✏️</button>
        <button class="task-action-btn" onclick="deleteCatMgr('${c}')">✕</button>
      </div>`).join('')}
    </div>
    <input class="modal-input" id="newCM" placeholder="Add new category...">
    <button class="modal-btn primary" onclick="addCatMgr()">+ Add</button>
    <button class="modal-btn secondary" onclick="closeModal()">Done</button>`);
}
function addCatMgr(){const v=document.getElementById('newCM').value.trim();if(v&&!S.categories.includes(v))S.categories.push(v);save();closeModal();manageCats();}
function deleteCatMgr(cat){S.categories=S.categories.filter(c=>c!==cat);if(S.currentCategory===cat)S.currentCategory='All';save();closeModal();manageCats();}
function renameCat(i){const old=S.categories[i];const nv=prompt('Rename:',old);if(!nv||nv===old)return;S.categories[i]=nv;Object.values(S.tasks).forEach(arr=>{if(Array.isArray(arr))arr.forEach(t=>{if(t.category===old)t.category=nv;});});save();closeModal();manageCats();}

// ============================================================
// DRAG & DROP
// ============================================================
function initDrag(tab){
  const items=document.querySelectorAll('.task-item');
  let src=null;
  items.forEach(item=>{
    item.addEventListener('dragstart',()=>{src=item;item.classList.add('dragging');});
    item.addEventListener('dragend',()=>item.classList.remove('dragging'));
    item.addEventListener('dragover',e=>{e.preventDefault();item.classList.add('drag-over');});
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{
      e.preventDefault();item.classList.remove('drag-over');
      if(!src||src===item)return;
      const fi=parseInt(src.dataset.index),ti=parseInt(item.dataset.index);
      const arr=S.tasks[tab];const[m]=arr.splice(fi,1);arr.splice(ti,0,m);
      save();render();
    });
  });
}

// ============================================================
// YEARLY SUB TABS
// ============================================================
function switchYearlySub(sub){S.currentYearlySub=sub;render();}
function addYearlySubTab(){
  openModal(`<div class="modal-handle"></div><div class="modal-title">New Section</div>
    <input class="modal-input" id="sti" placeholder="Section name (e.g. Books, Gym, Languages...)" style="width:100%">
    <div style="font-size:13px;color:var(--text3);margin-bottom:10px">Optional: add a progress tracker</div>
    <input class="modal-input" id="sti_total" type="number" placeholder="Total to reach (e.g. 12)" min="1" style="width:100%">
    <input class="modal-input" id="sti_unit" placeholder="Unit name (e.g. books, pages, sessions)" style="width:100%">
    <button class="modal-btn primary" onclick="saveYearlySub()">Create</button>
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>`);
}
function saveYearlySub(){
  const v=document.getElementById('sti').value.trim();
  if(!v){closeModal();return;}
  if(!S.yearlySubTabs.includes(v)){
    S.yearlySubTabs.push(v);
    S.tasks['yearly_'+v]=[];
    const total=parseInt(document.getElementById('sti_total').value)||0;
    const unit=document.getElementById('sti_unit').value.trim();
    if(total){if(!S.yearlyMeta)S.yearlyMeta={};S.yearlyMeta[v]={total,unit:unit||'items',done:0};}

function saveNotif(){
  const time=document.getElementById('nTime').value;
  const msg=document.getElementById('nMsg').value.trim();
  if(!msg)return;
  S.notifications.push({time,message:msg,created:Date.now()});save();
  scheduleNotif(time,msg);closeModal();openNotifManager();
}
function delNotif(i){S.notifications.splice(i,1);save();}
function scheduleNotif(time,message){
  if(!('Notification'in window)||Notification.permission!=='granted'||!time)return;
  const[hh,mm]=time.split(':').map(Number);
  const now=new Date(),target=new Date(now);
  target.setHours(hh,mm,0,0);if(target<=now)target.setDate(target.getDate()+1);
  setTimeout(()=>{
    new Notification('Octopus',{body:message});
    setInterval(()=>new Notification('Octopus',{body:message}),86400000);
  },target-now);
}

        <div id="fnl">${S.notifications.slice(-3).map(n=>`<div style="font-size:12px;color:var(--text3);padding:3px 0">${n.time} — ${h(n.message)}</div>`).join('')}</div>
      </div>
      <button class="flow-btn primary" onclick="endMorningFlow()">Let's win today 🚀</button>
    </div>`
  };

  const fn=render_step[step];
  if(fn){const r=fn();if(r)flow.innerHTML=r;}
}

function reviewStep(icon,title,tasks,next){
  return`<div class="flow-inner">
    <div class="flow-icon">${icon}</div><div class="flow-title">${title}</div>
    <div class="flow-subtitle">Keep these top of mind.</div>
    ${tasks.length?`<div style="width:100%;max-height:180px;overflow-y:auto;margin-bottom:14px">${tasks.map(t=>`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:14px;text-align:left;${t.done?'text-decoration:line-through;color:var(--done)':''}">${h(t.text)}</div>`).join('')}</div>`:`<div style="font-size:14px;color:var(--text3);margin-bottom:20px">Nothing set yet.</div>`}
    <button class="flow-btn primary" onclick="showMS(${next})">Done →</button>
    <button class="flow-btn secondary" onclick="endMorningFlow()">Skip</button>
  </div>`;
}

function bl2today(i){const t=S.tasks.backlog.splice(i,1)[0];t.done=false;S.tasks.today.push(t);save();showMS(1);}

function addFlowHP(){
  const inp=document.getElementById('hpfi');const v=inp.value.trim();if(!v)return;
  if(!S.happinessPlan)S.happinessPlan=[];
  S.happinessPlan.push({text:v,isTask:false,done:false});S.lastHPDate=td();inp.value='';save();
  const el=document.getElementById('hpfl');
  if(el)el.innerHTML=S.happinessPlan.map((p,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)"><div style="flex:1;font-size:14px">• ${h(p.text)}</div><button onclick="rmFlowHP(${i})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px">✕</button></div>`).join('');
}

function rmFlowHP(i){
  S.happinessPlan.splice(i,1);save();
  const el=document.getElementById('hpfl');
  if(el)el.innerHTML=S.happinessPlan.map((p,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)"><div style="flex:1;font-size:14px">• ${h(p.text)}</div><button onclick="rmFlowHP(${i})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px">✕</button></div>`).join('');
}

function finalHP(){S.lastHPDate=td();save();showMS(5);}
function setAODFlow(i){S.affirmationOfDay={text:S.affirmations[i].text||S.affirmations[i],date:td()};save();showMS(6);}

function addFlowNotif(){
  const time=document.getElementById('fnt').value;
  const msg=document.getElementById('fnm').value.trim();if(!msg)return;
  S.notifications.push({time,message:msg,created:Date.now()});save();scheduleNotif(time,msg);
  document.getElementById('fnm').value='';
  const el=document.getElementById('fnl');
  if(el)el.innerHTML+=`<div style="font-size:12px;color:var(--text3);padding:3px 0">${time} — ${h(msg)}</div>`;
}

function endMorningFlow(){S.lastMorningFlow=td();save();endFlow();render();}

function scheduleAffReminders(){
  if(!('Notification'in window)||Notification.permission!=='granted')return;
  [9,12,15,18].forEach(hh=>{
    const now=new Date(),t=new Date(now);t.setHours(hh,0,0,0);
    if(t<=now)t.setDate(t.getDate()+1);
    setTimeout(()=>{
      new Notification('Octopus',{body:'✨ Time to read your affirmations!'});
      setInterval(()=>new Notification('Octopus',{body:'✨ Read your affirmations!'}),86400000);
    },t-now);
  });
}

load();
if(S.darkMode){document.body.classList.add('dark');document.getElementById('darkBtn').textContent='☀️';}
// Set correct bottom nav tab active on load

    Notification.requestPermission().then(p=>{if(p==='granted'){scheduleAffReminders();S.notifications.forEach(n=>scheduleNotif(n.time,n.message));}});
  } else if(Notification.permission==='granted'){
    scheduleAffReminders();S.notifications.forEach(n=>scheduleNotif(n.time,n.message));
  }
}

// ============================================================
// OFFLINE CACHE — works on GitHub Pages
// ============================================================
(async function() {
  if (!('caches' in window)) return;
  try {
    const CACHE = 'octopus-v2';
    const cache = await caches.open(CACHE);
    const url = location.href.split('?')[0];
    const existing = await cache.match(url);
    if (!existing) {
      const resp = await fetch(url);
      if (resp && resp.status === 200) await cache.put(url, resp.clone());
    }
    // On future loads, serve from cache if offline
    window.addEventListener('online', async () => {
      const resp = await fetch(url).catch(()=>null);
      if (resp && resp.status === 200) await cache.put(url, resp.clone());
    });
  } catch(e) {}
})();

// PWA install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if(!window.matchMedia('(display-mode: standalone)').matches) {
    const banner = document.createElement('div');
    banner.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--accent2);color:white;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.25);white-space:nowrap';
    banner.textContent = '📲 Install as app — tap here';
    banner.onclick = () => { deferredPrompt.prompt(); banner.remove(); };
    document.body.appendChild(banner);
    setTimeout(() => { if(banner.parentNode) banner.remove(); }, 10000);
  }
});
